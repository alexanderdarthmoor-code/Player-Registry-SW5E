<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Registry — SW5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#09090b;
  --surface:#0f1014;
  --surface2:#15161b;
  --surface3:#1c1d24;
  --amber:#d4873a;
  --amber-dim:#7a4a1a;
  --amber-glow:rgba(212,135,58,0.12);
  --amber-border:rgba(212,135,58,0.25);
  --amber-border-bright:rgba(212,135,58,0.55);
  --green:#3dba7e;
  --green-dim:rgba(61,186,126,0.15);
  --blue:#5b9bd5;
  --blue-dim:rgba(91,155,213,0.15);
  --red:#d45b5b;
  --red-dim:rgba(212,91,91,0.15);
  --purple:#9b7fe8;
  --purple-dim:rgba(155,127,232,0.15);
  --text:#c8b898;
  --text-muted:#5a5040;
  --text-bright:#f0e4cc;
  --text-dim:#7a6a50;
  --border:rgba(212,135,58,0.14);
  --border-mid:rgba(212,135,58,0.28);
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
  --radius:3px;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}

/* ── HEADER ── */
.site-header{border-bottom:1px solid var(--border-mid);padding:1.5rem 2rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;gap:1rem}
.header-brand{display:flex;flex-direction:column}
.brand-eyebrow{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:var(--amber-dim);text-transform:uppercase;margin-bottom:3px}
.brand-name{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--amber);letter-spacing:.06em;text-transform:uppercase;line-height:1}
.header-status{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-align:right}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── NAV ── */
.main-nav{display:flex;gap:2px;padding:0 2rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.nav-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.nav-divider{width:1px;background:var(--border);margin:6px 4px;flex-shrink:0}

/* ── PAGES ── */
.page{display:none;animation:fadein .2s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── CHARACTER SHEET ── */
.char-layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 120px)}

.char-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:1.25rem}

.char-portrait{width:100%;aspect-ratio:3/4;background:var(--surface2);border:1px solid var(--border-mid);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.portrait-placeholder{font-family:var(--font-mono);font-size:36px;color:var(--amber-dim);line-height:1}
.portrait-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:6px 10px;font-family:var(--font-mono);font-size:9px;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;text-align:center}

.char-identity{}
.char-name{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--text-bright);letter-spacing:.04em;line-height:1.1}
.char-species{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.char-class-line{font-size:13px;color:var(--amber);margin-top:6px;font-weight:500}

.sidebar-block{border-top:1px solid var(--border);padding-top:1rem}
.block-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:8px}

.hp-display{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.hp-current{font-family:var(--font-display);font-size:36px;font-weight:700;color:var(--green);line-height:1}
.hp-sep{font-size:18px;color:var(--text-muted)}
.hp-max{font-family:var(--font-display);font-size:20px;color:var(--text-dim);line-height:1}
.hp-label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}

.fp-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.fp-pip{width:14px;height:14px;border-radius:50%;border:1px solid var(--purple);background:var(--purple-dim)}
.fp-pip.filled{background:var(--purple)}

.mini-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mini-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;text-align:center}
.mini-val{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text-bright);line-height:1}
.mini-lbl{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* Char main */
.char-main{padding:1.5rem 2rem;display:flex;flex-direction:column;gap:1.5rem}

.sheet-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sheet-section-header{padding:.6rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.sheet-section-title{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber)}
.sheet-section-body{padding:1rem}

/* Ability scores */
.ability-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.ability-box{background:var(--surface2);border:1px solid var(--border-mid);border-radius:var(--radius);padding:8px 4px;text-align:center}
.ability-name{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}
.ability-score{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-bright);line-height:1.1}
.ability-mod{font-family:var(--font-mono);font-size:11px;color:var(--amber)}

/* Saves & skills */
.saves-skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.skill-list{display:flex;flex-direction:column;gap:3px}
.skill-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text)}
.skill-pip{width:8px;height:8px;border-radius:50%;border:1px solid var(--border-mid);flex-shrink:0}
.skill-pip.prof{background:var(--amber);border-color:var(--amber)}
.skill-pip.exp{background:var(--green);border-color:var(--green)}
.skill-val{font-family:var(--font-mono);font-size:11px;color:var(--amber);margin-left:auto;min-width:24px;text-align:right}

/* Force powers */
.power-list{display:flex;flex-direction:column;gap:6px}
.power-row{display:grid;grid-template-columns:1fr auto auto;gap:.75rem;align-items:start;padding:7px 0;border-bottom:1px solid var(--border)}
.power-row:last-child{border-bottom:none}
.power-name{font-size:13px;font-weight:500;color:var(--text-bright)}
.power-desc{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.power-cost{font-family:var(--font-mono);font-size:10px;color:var(--purple);white-space:nowrap}
.power-type{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid var(--border);color:var(--text-muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}

/* Inventory */
.inventory-table{width:100%;border-collapse:collapse}
.inventory-table th{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:4px 8px;border-bottom:1px solid var(--border)}
.inventory-table td{font-size:12px;color:var(--text);padding:6px 8px;border-bottom:1px solid var(--border)}
.inventory-table tr:last-child td{border-bottom:none}
.inventory-table tr:hover td{background:var(--amber-glow)}
.item-rarity{font-family:var(--font-mono);font-size:9px;padding:1px 6px;border-radius:2px}
.rare-standard{color:var(--text-muted);border:1px solid var(--border)}
.rare-uncommon{color:var(--blue);border:1px solid rgba(91,155,213,.3);background:var(--blue-dim)}
.rare-rare{color:var(--purple);border:1px solid rgba(155,127,232,.3);background:var(--purple-dim)}
.rare-legendary{color:var(--amber);border:1px solid var(--amber-border);background:var(--amber-glow)}
.credits-display{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--amber);margin-top:.5rem}
.credits-label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-left:4px}

/* Downtime */
.downtime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.dt-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.dt-activity{font-size:12px;font-weight:500;color:var(--text-bright);margin-bottom:3px}
.dt-result{font-size:11px;color:var(--text-dim);line-height:1.4}
.dt-status{display:inline-block;font-family:var(--font-mono);font-size:9px;padding:1px 7px;border-radius:2px;margin-top:5px}
.dt-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,186,126,.3)}
.dt-pending{background:var(--amber-glow);color:var(--amber);border:1px solid var(--amber-border)}
.dt-fail{background:var(--red-dim);color:var(--red);border:1px solid rgba(212,91,91,.3)}

/* Faction stats */
.faction-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.faction-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 6px;text-align:center}
.fstat-val{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--amber);line-height:1}
.fstat-bar{height:3px;background:var(--surface3);border-radius:2px;margin:5px 0 3px;overflow:hidden}
.fstat-fill{height:100%;border-radius:2px;background:var(--amber)}
.fstat-lbl{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}

/* Relationships */
.rel-list{display:flex;flex-direction:column;gap:8px}
.rel-row{display:grid;grid-template-columns:auto 1fr auto;gap:.75rem;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
.rel-row:last-child{border-bottom:none}
.rel-icon{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rel-name{font-size:13px;font-weight:500;color:var(--text-bright)}
.rel-role{font-size:11px;color:var(--text-muted)}
.rel-note{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4;font-style:italic}
.bond-meter{display:flex;gap:3px;margin-top:4px}
.bond-pip{width:10px;height:4px;border-radius:1px;background:var(--surface3);border:1px solid var(--border)}
.bond-pip.filled{background:var(--amber);border-color:var(--amber)}

/* ── SHIPS PAGE ── */
.ships-page{padding:1.5rem 2rem;max-width:1400px;margin:0 auto}
.ships-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.25rem;margin-top:1.25rem}
.ship-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;transition:border-color .2s}
.ship-card:hover{border-color:var(--border-mid)}
.ship-card::before,.ship-card::after{content:'';position:absolute;width:10px;height:10px;pointer-events:none;z-index:2}
.ship-card::before{top:-1px;left:-1px;border-top:1px solid var(--amber);border-left:1px solid var(--amber)}
.ship-card::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--amber);border-right:1px solid var(--amber)}
.ship-card-header{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border)}
.ship-faction-badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:2px 9px;border-radius:2px;margin-bottom:8px;display:inline-block}
.sfb-rebel{background:rgba(212,91,91,.1);color:var(--red);border:1px solid rgba(212,91,91,.25)}
.sfb-vossar{background:rgba(155,127,232,.1);color:var(--purple);border:1px solid rgba(155,127,232,.25)}
.sfb-virellian{background:rgba(61,186,126,.1);color:var(--green);border:1px solid rgba(61,186,126,.25)}
.ship-name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:.03em;line-height:1.15}
.ship-class{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.08em;margin-top:3px}
.ship-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border)}
.ship-tab{flex:1;padding:8px 4px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s}
.ship-tab:hover{color:var(--text)}
.ship-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.ship-pane{display:none;padding:1rem 1.25rem}
.ship-pane.active{display:block}
.ship-stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:.75rem}
.ship-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 4px;text-align:center}
.sstat-val{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--amber);line-height:1}
.sstat-lbl{font-family:var(--font-mono);font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.ship-bar-row{margin-bottom:3px}
.ship-bar-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-bottom:3px}
.ship-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:8px}
.ship-bar-fill{height:100%;border-radius:2px}
.bar-hp{background:var(--green)}
.bar-sp{background:var(--blue)}
.ship-abilities{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:.75rem}
.sab{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 3px;text-align:center}
.sab-name{font-family:var(--font-mono);font-size:7px;color:var(--text-muted);letter-spacing:.05em}
.sab-score{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text-bright);line-height:1.2}
.sab-mod{font-family:var(--font-mono);font-size:9px;color:var(--amber)}
.ship-sec-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber-dim);border-bottom:1px solid var(--amber-dim);padding-bottom:3px;margin-bottom:8px}
.ship-trait{font-size:12px;color:var(--text);margin-bottom:7px;line-height:1.55}
.ship-trait strong{color:var(--text-bright);font-weight:500}
.ship-action{margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.ship-action:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ship-action-header{display:flex;align-items:baseline;gap:5px;margin-bottom:2px;flex-wrap:wrap}
.ship-action-name{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text-bright)}
.ship-action-uses{font-family:var(--font-mono);font-size:9px;color:var(--amber)}
.ship-action-type{font-family:var(--font-mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid var(--border);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-left:auto}
.ship-action-desc{font-size:11.5px;color:var(--text);line-height:1.55}
.ship-pilot-note{background:var(--surface2);border-left:2px solid var(--purple);padding:10px 12px;border-radius:0 var(--radius) var(--radius) 0;font-size:12px;line-height:1.65;color:var(--text)}
.ship-pilot-note strong{font-family:var(--font-mono);font-size:8px;color:var(--purple);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px}

/* ── PAGE HEADER ── */
.page-header{padding:1.5rem 2rem 1.25rem;border-bottom:1px solid var(--border)}
.page-title{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text-bright);letter-spacing:.04em}
.page-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em;margin-top:4px}

/* ── OPERATIONS PAGE ── */
.ops-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.ops-stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px 12px}
.ops-stat-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ops-stat-name{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.ops-stat-val{font-family:var(--font-display);font-size:26px;font-weight:700;line-height:1}
.ops-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:7px}
.ops-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.ops-stat-sub{font-size:11px;color:var(--text-dim);line-height:1.4}
.ops-downtime-block{display:flex;flex-direction:column;gap:1.25rem}
.ops-char-block{}
.ops-char-label{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:.04em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.event-list{display:flex;flex-direction:column;gap:0}
.event-row{display:grid;grid-template-columns:64px 1fr auto;gap:1rem;align-items:start;padding:10px 0;border-bottom:1px solid var(--border)}
.event-row:last-child{border-bottom:none}
.event-session{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;padding-top:2px}
.event-title{font-size:13px;font-weight:500;color:var(--text-bright);margin-bottom:2px}
.event-desc{font-size:12px;color:var(--text-dim);line-height:1.5}
.event-effect{font-family:var(--font-mono);font-size:10px;white-space:nowrap;padding:2px 8px;border-radius:2px;margin-top:2px}
.effect-pos{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,186,126,.3)}
.effect-neg{background:var(--red-dim);color:var(--red);border:1px solid rgba(212,91,91,.3)}

/* Responsive */
@media(max-width:768px){
  .char-layout{grid-template-columns:1fr}
  .char-sidebar{border-right:none;border-bottom:1px solid var(--border)}
  .ability-grid{grid-template-columns:repeat(3,1fr)}
  .faction-stats{grid-template-columns:repeat(3,1fr)}
  .saves-skills-grid{grid-template-columns:1fr}
  .site-header{padding:1rem}
  .char-main,.ships-page{padding:1rem}
  .main-nav{padding:0 .5rem}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-brand">
    <div class="brand-eyebrow">SW5e — OT Era Campaign</div>
    <div class="brand-name">Cell Registry</div>
  </div>
  <div class="header-status">
    <span class="status-dot"></span>ENCRYPTED CHANNEL ACTIVE<br>
    <span style="color:var(--text-dim)">REBEL ALLIANCE — CLASSIFIED</span>
  </div>
</header>

<nav class="main-nav" id="mainNav">
  <!-- Populated by JS -->
</nav>

<main id="pageContainer">
  <!-- Populated by JS -->
</main>

<script>
// ═══════════════════════════════════════════════
//  DM DATA — EDIT THIS SECTION BETWEEN SESSIONS
// ═══════════════════════════════════════════════

const FACTION_STATS = {
  Resources: 25,
  Morale: 40,
  Influence: 30,
  Military: 30,
  Secrecy: 60
};

// Galactic events — add an entry after each session

function m(v){ return v[1] >= 0 ? `+${v[1]}` : String(v[1]); }

function renderCharPage(c) {
  const fpPips = Array.from({length: c.forcePoints.max}, (_,i) =>
    `<div class="fp-pip${i < c.forcePoints.current ? ' filled' : ''}"></div>`
  ).join('');

  const abilities = Object.entries(c.abilities).map(([n,v]) =>
    `<div class="ability-box">
      <div class="ability-name">${n}</div>
      <div class="ability-score">${v[0]}</div>
      <div class="ability-mod">${m(v)}</div>
    </div>`
  ).join('');

  const saves = c.saves.map(s =>
    `<div class="skill-row">
      <div class="skill-pip${s.prof?' prof':''}"></div>
      <span>${s.name}</span>
      <span class="skill-val">${s.mod}</span>
    </div>`
  ).join('');

  const skills = c.skills.map(s =>
    `<div class="skill-row">
      <div class="skill-pip${s.exp?' exp':s.prof?' prof':''}"></div>
      <span>${s.name}</span>
      <span class="skill-val">${s.mod}</span>
    </div>`
  ).join('');

  const powers = c.forcePowers.map(p =>
    `<div class="power-row">
      <div>
        <div class="power-name">${p.name}</div>
        <div class="power-desc">${p.desc}</div>
      </div>
      <div class="power-cost">${p.cost}</div>
      <div class="power-type">${p.type}</div>
    </div>`
  ).join('');

  const rarityClass = { standard:'rare-standard', uncommon:'rare-uncommon', rare:'rare-rare', legendary:'rare-legendary' };
  const inventory = c.inventory.map(item =>
    `<tr>
      <td>${item.name}</td>
      <td>${item.qty}</td>
      <td>${item.wt}</td>
      <td><span class="item-rarity ${rarityClass[item.rarity]}">${item.rarity}</span></td>
      <td style="color:var(--text-dim);font-size:11px">${item.notes}</td>
    </tr>`
  ).join('');

  const dtStatus = { success:'dt-success', pending:'dt-pending', fail:'dt-fail' };
  const downtime = c.downtime.map(d =>
    `<div class="dt-card">
      <div class="dt-activity">${d.activity}</div>
      <div class="dt-result">${d.result}</div>
      <span class="dt-status ${dtStatus[d.status]}">${d.status.toUpperCase()}</span>
    </div>`
  ).join('');

  const factionStats = Object.entries(FACTION_STATS).map(([k,v]) =>
    `<div class="faction-stat">
      <div class="fstat-val">${v}</div>
      <div class="fstat-bar"><div class="fstat-fill" style="width:${Math.min(v,100)}%"></div></div>
      <div class="fstat-lbl">${k}</div>
    </div>`
  ).join('');

  const relationships = c.relationships.map(r =>
    `<div class="rel-row">
      <div class="rel-icon">${r.icon}</div>
      <div>
        <div class="rel-name">${r.name}</div>
        <div class="rel-role">${r.role}</div>
        <div class="rel-note">${r.note}</div>
        <div class="bond-meter">${Array.from({length:5},(_,i)=>`<div class="bond-pip${i<r.bond?' filled':''}"></div>`).join('')}</div>
      </div>
    </div>`
  ).join('');

  return `
  <div class="char-layout">
    <aside class="char-sidebar">
      <div class="char-portrait">
        <div class="portrait-placeholder">${c.portraitEmoji}</div>
        <div class="portrait-label">${c.portraitLabel}</div>
      </div>
      <div class="char-identity">
        <div class="char-name">${c.name}</div>
        <div class="char-species">${c.species}</div>
        <div class="char-class-line">${c.classLine}</div>
      </div>
      <div class="sidebar-block">
        <div class="block-label">Hit Points</div>
        <div class="hp-display">
          <span class="hp-current">${c.hp.current}</span>
          <span class="hp-sep">/</span>
          <span class="hp-max">${c.hp.max}</span>
        </div>
        ${c.hp.temp ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--blue)">+${c.hp.temp} temp HP</div>` : ''}
      </div>
      <div class="sidebar-block">
        <div class="block-label">Force Points</div>
        <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--purple);line-height:1;margin-bottom:6px">${c.forcePoints.current} / ${c.forcePoints.max}</div>
        <div class="fp-row">${fpPips}</div>
      </div>
      <div class="sidebar-block">
        <div class="block-label">Combat</div>
        <div class="mini-stat-grid">
          <div class="mini-stat"><div class="mini-val">${c.ac}</div><div class="mini-lbl">AC</div></div>
          <div class="mini-stat"><div class="mini-val">${c.initiative}</div><div class="mini-lbl">Initiative</div></div>
          <div class="mini-stat" style="grid-column:1/-1"><div class="mini-val">${c.speed}</div><div class="mini-lbl">Speed</div></div>
        </div>
      </div>
    </aside>

    <div class="char-main">

      <div class="sheet-section">
        <div class="sheet-section-header"><span class="sheet-section-title">Ability Scores</span></div>
        <div class="sheet-section-body">
          <div class="ability-grid">${abilities}</div>
        </div>
      </div>

      <div class="sheet-section">
        <div class="sheet-section-header"><span class="sheet-section-title">Saves &amp; Skills</span></div>
        <div class="sheet-section-body">
          <div class="saves-skills-grid">
            <div>
              <div class="block-label" style="margin-bottom:8px">Saving Throws</div>
              <div class="skill-list">${saves}</div>
            </div>
            <div>
              <div class="block-label" style="margin-bottom:8px">Skills</div>
              <div class="skill-list">${skills}</div>
            </div>
          </div>
          <div style="margin-top:.75rem;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:4px"></span>Proficient &nbsp;
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px"></span>Expertise
          </div>
        </div>
      </div>

      ${c.forcePowers.length ? `
      <div class="sheet-section">
        <div class="sheet-section-header"><span class="sheet-section-title">Force Powers</span></div>
        <div class="sheet-section-body">
          <div class="power-list">${powers}</div>
        </div>
      </div>` : ''}

      <div class="sheet-section">
        <div class="sheet-section-header"><span class="sheet-section-title">Inventory</span></div>
        <div class="sheet-section-body">
          <table class="inventory-table" style="width:100%">
            <thead><tr><th>Item</th><th>Qty</th><th>Wt</th><th>Rarity</th><th>Notes</th></tr></thead>
            <tbody>${inventory}</tbody>
          </table>
          <div style="margin-top:.75rem">
            <span class="credits-display">${c.credits.toLocaleString()}</span>
            <span class="credits-label">credits</span>
          </div>
        </div>
      </div>

      <div class="sheet-section">
        <div class="sheet-section-header"><span class="sheet-section-title">Relationships &amp; Bonds</span></div>
        <div class="sheet-section-body">
          <div class="rel-list">${relationships}</div>
          <div style="margin-top:.75rem;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">Bond strength: ${Array.from({length:5},(_,i)=>`<span style="display:inline-block;width:10px;height:4px;border-radius:1px;background:${i<3?'var(--amber)':'var(--surface3)'};border:1px solid var(--border);margin-right:2px"></span>`).join('')} 3 = Bond Boon available</div>
        </div>
      </div>

    </div>
  </div>`;
}

function renderShipsPage() {
  const cards = SHIPS.map((s, i) => {
    const hpPct = Math.round((s.hp/80)*100);
    const spPct = Math.round((s.shield/50)*100);
    const abs = [['STR',s.str],['DEX',s.dex],['CON',s.con],['INT',s.int],['WIS',s.wis],['CHA',s.cha]];
    const acts = s.actions.filter(a=>a.type==='action');
    const reacts = s.actions.filter(a=>a.type==='reaction');
    const uid = `ship${i}`;
    return `
    <div class="ship-card">
      <div class="ship-card-header">
        <span class="ship-faction-badge ${s.badge}">${s.faction}</span>
        <div class="ship-name">${s.name}</div>
        <div class="ship-class">${s.cls}</div>
      </div>
      <div class="ship-tabs">
        <button class="ship-tab active" onclick="shipTab(this,'${uid}_stats','${uid}')">Stats</button>
        <button class="ship-tab" onclick="shipTab(this,'${uid}_wpn','${uid}')">Weapons</button>
        <button class="ship-tab" onclick="shipTab(this,'${uid}_pilot','${uid}')">Pilot</button>
      </div>
      <div id="${uid}">
        <div class="ship-pane active" id="${uid}_stats">
          <div class="ship-stat-row">
            <div class="ship-stat"><div class="sstat-val">${s.ac}</div><div class="sstat-lbl">AC</div></div>
            <div class="ship-stat"><div class="sstat-val">${s.hp}</div><div class="sstat-lbl">HP</div></div>
            <div class="ship-stat"><div class="sstat-val">${s.shield}</div><div class="sstat-lbl">Shields</div></div>
            <div class="ship-stat"><div class="sstat-val">${s.regen}</div><div class="sstat-lbl">Regen</div></div>
            <div class="ship-stat"><div class="sstat-val">${s.speed}</div><div class="sstat-lbl">Speed</div></div>
          </div>
          <div class="ship-bar-row">
            <div class="ship-bar-labels"><span>Hull</span><span>${s.hp} HP</span></div>
            <div class="ship-bar"><div class="ship-bar-fill bar-hp" style="width:${hpPct}%"></div></div>
          </div>
          <div class="ship-bar-row">
            <div class="ship-bar-labels"><span>Shields</span><span>${s.shield} SP</span></div>
            <div class="ship-bar"><div class="ship-bar-fill bar-sp" style="width:${spPct}%"></div></div>
          </div>
          <div class="ship-abilities">
            ${abs.map(([n,v])=>`<div class="sab"><div class="sab-name">${n}</div><div class="sab-score">${v[0]}</div><div class="sab-mod">${m(v)}</div></div>`).join('')}
          </div>
          <div class="ship-sec-label">Ship Traits</div>
          ${s.traits.map(t=>`<div class="ship-trait"><strong>${t.name}.</strong> ${t.desc}</div>`).join('')}
        </div>
        <div class="ship-pane" id="${uid}_wpn">
          <div class="ship-sec-label">Actions</div>
          ${acts.map(a=>`<div class="ship-action"><div class="ship-action-header"><span class="ship-action-name">${a.name}</span><span class="ship-action-uses">${a.uses}</span><span class="ship-action-type">Action</span></div><div class="ship-action-desc">${a.desc}</div></div>`).join('')}
          <div class="ship-sec-label" style="margin-top:1rem">Reactions</div>
          ${reacts.map(a=>`<div class="ship-action"><div class="ship-action-header"><span class="ship-action-name">${a.name}</span><span class="ship-action-uses">${a.uses}</span><span class="ship-action-type">Reaction</span></div><div class="ship-action-desc">${a.desc}</div></div>`).join('')}
        </div>
        <div class="ship-pane" id="${uid}_pilot">
          <div class="ship-pilot-note"><strong>Pilot Guidance</strong>${s.pilotNote}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="ships-page">
    <div class="page-header" style="padding:1.5rem 0 1.25rem">
      <div class="page-title">Cell Ships</div>
      <div class="page-sub">REBEL ALLIANCE — REGISTERED VESSELS — CLASSIFIED</div>
    </div>
    <div class="ships-grid">${cards}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  OPERATIONS PAGE
// ═══════════════════════════════════════════════
function renderOperationsPage() {

  // ── Faction stat bars ──
  const factionStats = Object.entries(FACTION_STATS).map(([k,v]) => {
    const pct = Math.min(v, 100);
    let color = 'var(--amber)';
    if (k === 'Morale')    color = 'var(--green)';
    if (k === 'Secrecy')   color = 'var(--blue)';
    if (k === 'Military')  color = 'var(--red)';
    if (k === 'Influence') color = 'var(--purple)';
    return `
    <div class="ops-stat-card">
      <div class="ops-stat-header">
        <span class="ops-stat-name">${k}</span>
        <span class="ops-stat-val" style="color:${color}">${v}</span>
      </div>
      <div class="ops-bar"><div class="ops-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="ops-stat-sub">${k === 'Resources' ? 'Credits, supplies, safe houses' : k === 'Morale' ? 'Cell cohesion & willingness to fight' : k === 'Influence' ? 'Public & political reach' : k === 'Military' ? 'Combat strength & readiness' : 'How hidden the cell remains'}</div>
    </div>`;
  }).join('');

  // ── Per-character downtime ──
  const dtStatus = { success:'dt-success', pending:'dt-pending', fail:'dt-fail' };
  const charDowntime = CHARACTERS.map(c => {
    const rows = c.downtime.map(d => `
      <div class="dt-card">
        <div class="dt-activity">${d.activity}</div>
        <div class="dt-result">${d.result}</div>
        <span class="dt-status ${dtStatus[d.status]}">${d.status.toUpperCase()}</span>
      </div>`).join('');
    return `
    <div class="ops-char-block">
      <div class="ops-char-label" style="color:${c.factionColor}">${c.name}</div>
      <div class="downtime-grid">${rows}</div>
    </div>`;
  }).join('');

  // ── Event log ──
  const eventLog = (CELL_EVENTS || []).length ? CELL_EVENTS.map(e => `
    <div class="event-row">
      <div class="event-session">Session ${e.session}</div>
      <div class="event-body">
        <div class="event-title">${e.title}</div>
        <div class="event-desc">${e.desc}</div>
      </div>
      <div class="event-effect ${e.positive ? 'effect-pos' : 'effect-neg'}">${e.effect}</div>
    </div>`).join('')
  : `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:.5rem 0">No events recorded yet. Add entries to CELL_EVENTS in the DM data section.</div>`;

  return `
  <div class="ships-page">
    <div class="page-header" style="padding:1.5rem 0 1.25rem">
      <div class="page-title">Operations</div>
      <div class="page-sub">REBEL CELL — DOWNTIME LOG &amp; FACTION STATUS</div>
    </div>

    <div class="sheet-section" style="margin-bottom:1.25rem">
      <div class="sheet-section-header"><span class="sheet-section-title">Cell Faction Stats</span></div>
      <div class="sheet-section-body">
        <div class="ops-stats-grid">${factionStats}</div>
        <div style="margin-top:.75rem;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.08em">
          +1 IMPERIAL ALERTNESS PER SESSION (BASELINE) &nbsp;·&nbsp; SYNDICATE INTEL AVAILABLE AT GM DISCRETION
        </div>
      </div>
    </div>

    <div class="sheet-section" style="margin-bottom:1.25rem">
      <div class="sheet-section-header"><span class="sheet-section-title">Downtime Log — Current Arc</span></div>
      <div class="sheet-section-body">
        <div class="ops-downtime-block">${charDowntime}</div>
      </div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-header"><span class="sheet-section-title">Galactic Event Log</span></div>
      <div class="sheet-section-body">
        <div class="event-list">${eventLog}</div>
      </div>
    </div>

  </div>`;
}

// ═══════════════════════════════════════════════
//  NAV & ROUTING
// ═══════════════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('mainNav');
  let html = '';
  CHARACTERS.forEach((c, i) => {
    html += `<button class="nav-btn${i===0?' active':''}" onclick="showPage('char_${c.id}',this)">${c.name.split(' ')[0]}</button>`;
  });
  html += '<div class="nav-divider"></div>';
  html += `<button class="nav-btn" onclick="showPage('ships',this)">Ships</button>`;
  html += `<button class="nav-btn" onclick="showPage('operations',this)">Operations</button>`;
  nav.innerHTML = html;
}

function buildPages() {
  const container = document.getElementById('pageContainer');
  let html = '';
  CHARACTERS.forEach((c, i) => {
    html += `<div class="page${i===0?' active':''}" id="page_char_${c.id}">${renderCharPage(c)}</div>`;
  });
  html += `<div class="page" id="page_ships">${renderShipsPage()}</div>`;
  html += `<div class="page" id="page_operations">${renderOperationsPage()}</div>`;
  container.innerHTML = html;
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page_' + id).classList.add('active');
  btn.classList.add('active');
}

function shipTab(btn, paneId, containerId) {
  const container = document.getElementById(containerId);
  const card = btn.closest('.ship-card');
  card.querySelectorAll('.ship-tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.ship-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(paneId).classList.add('active');
}

buildNav();
buildPages();
</script>
</body>
</html>
