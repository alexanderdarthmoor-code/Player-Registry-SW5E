import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
const DM_EMAIL="alexander.darthmoor@gmail.com";
const firebaseConfig={apiKey:"AIzaSyB7N0A8eBdQVRhnD57GFOhdSNSR75yZLZg",authDomain:"sw-homebrew.firebaseapp.com",projectId:"sw-homebrew",storageBucket:"sw-homebrew.firebasestorage.app",messagingSenderId:"426994499491",appId:"1:426994499491:web:997aad0b1954fd1293a416"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);
const provider=new GoogleAuthProvider();
const LIVE_FIELDS=["hp","hpTemp","fp","fpMax","hpMax","credits","inv","dt","rels","notes","abs","saves","skills","powers","ac","init","spd","portrait","name","species","cls"];
let currentUser=null;
window.isDM=()=>currentUser&&currentUser.email===DM_EMAIL;
window.isAuthed=()=>!!currentUser;
function updateAuthUI(user){
  currentUser=user;
  const btn=document.getElementById("authbtn");
  const label=document.getElementById("authlabel");
  if(!btn)return;
  if(user){label.textContent=user.displayName||user.email;btn.textContent="Sign out";btn.onclick=()=>signOut(auth);}
  else{label.textContent="";btn.textContent="Sign in";btn.onclick=()=>signInWithPopup(auth,provider).catch(e=>alert("Sign in failed: "+e.message));}
  if(window.render)window.render();
}
window.requireAuth=function(){
  if(currentUser)return true;
  if(confirm("Sign in with Google to make changes?"))signInWithPopup(auth,provider).catch(e=>alert("Sign in failed: "+e.message));
  return false;
};
window.requireDM=function(){
  if(window.isDM())return true;
  alert("Only the DM can edit this.");
  return false;
};
async function pushChar(c){
  if(!currentUser)return;
  const p={};LIVE_FIELDS.forEach(f=>{if(c[f]!==undefined)p[f]=c[f];});
  await setDoc(doc(db,"campaign","chars_"+c.id),p,{merge:true});
}
async function pushFaction(){
  if(!currentUser)return;
  await setDoc(doc(db,"campaign","faction"),window.FACTION,{merge:true});
}
window.fbPushChar=pushChar;
window.fbPushFaction=pushFaction;
window.uploadPortrait=async function(charId){
  if(!window.isDM()){alert("Only the DM can upload portraits.");return;}
  const input=document.createElement("input");
  input.type="file";input.accept="image/*";
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const el=document.getElementById("pstat_"+charId);
    if(el)el.textContent="Uploading...";
    try{
      const r=ref(storage,"portraits/"+charId+"_"+Date.now());
      await uploadBytes(r,file);
      const url=await getDownloadURL(r);
      const c=window.chars.find(x=>x.id===charId);
      if(c){c.portrait=url;await pushChar(c);window.render();}
    }catch(err){alert("Upload failed: "+err.message);if(el)el.textContent="";}
  };
  input.click();
};
async function loadFromFirestore(){
  for(const c of window.chars){
    try{const snap=await getDoc(doc(db,"campaign","chars_"+c.id));if(snap.exists()){const d=snap.data();LIVE_FIELDS.forEach(f=>{if(d[f]!==undefined)c[f]=d[f];});}}
    catch(e){console.warn("Could not load char",c.id,e);}
  }
  try{const snap=await getDoc(doc(db,"campaign","faction"));if(snap.exists()){const d=snap.data();Object.keys(window.FACTION).forEach(k=>{if(d[k]!==undefined)window.FACTION[k]=d[k];});}}
  catch(e){console.warn("Could not load faction",e);}
  window.render();
  const ss=document.getElementById("syncstatus");if(ss)ss.textContent="LIVE — REBEL ALLIANCE ENCRYPTED";
  window.chars.forEach(c=>{
    onSnapshot(doc(db,"campaign","chars_"+c.id),snap=>{
      if(!snap.exists())return;const d=snap.data();LIVE_FIELDS.forEach(f=>{if(d[f]!==undefined)c[f]=d[f];});window.render();
    });
  });
  onSnapshot(doc(db,"campaign","faction"),snap=>{
    if(!snap.exists())return;const d=snap.data();Object.keys(window.FACTION).forEach(k=>{if(d[k]!==undefined)window.FACTION[k]=d[k];});window.render();
  });
}
onAuthStateChanged(auth,user=>{updateAuthUI(user);});
window.addEventListener("appReady",loadFromFirestore);
</script>

function ms(v){return v>=0?"+"+v:String(v)}
function mod(s){return Math.floor((s-10)/2)}
function recalc(c){
  const am={};
  Object.entries(c.abs).forEach(([k,[s]])=>{am[k]=mod(s);c.abs[k]=[s,mod(s)];});
  c.saves.forEach(sv=>{const b=am[sv.ab]||0;sv.m=ms(sv.e?b+PROF*2:sv.p?b+PROF:b);});
  c.skills.forEach(sk=>{const b=am[sk.ab]||0;sk.m=ms(sk.e?b+PROF*2:sk.p?b+PROF:b);});
}

function upd(id,fn){
  if(!window.requireAuth())return;
  const c=chars.find(x=>x.id===id);fn(c);render();
  if(window.fbPushChar)window.fbPushChar(c);
}
function gc(id){return chars.find(x=>x.id===id)}
function editAb(id,ab){
  if(!window.requireAuth())return;
  const c=gc(id);const v=prompt("Set "+ab+" score:",c.abs[ab][0]);if(v===null)return;
  const n=Math.max(1,Math.min(30,parseInt(v)||c.abs[ab][0]));
  upd(id,c=>{c.abs[ab]=[n,mod(n)];recalc(c);});
}
function toggleProf(id,type,idx){
  if(!window.requireAuth())return;
  upd(id,c=>{
    const arr=type==="save"?c.saves:c.skills;const item=arr[idx];
    if(!item.p&&!item.e){item.p=1;}else if(item.p&&!item.e){item.e=1;delete item.p;}else{delete item.p;delete item.e;}
    recalc(c);
  });
}

function addItem(id){if(!window.requireAuth())return;const n=prompt("Item name:");if(!n)return;const q=parseInt(prompt("Qty:","1"))||1;const w=prompt("Weight:","?")||"?";const r=prompt("Rarity (standard/uncommon/rare/legendary):","standard")||"standard";const d=prompt("Notes:","")||"";upd(id,c=>{c.inv.push({n,q,w,r,d});});}
function delItem(id,idx){if(!window.requireAuth())return;if(!confirm("Remove this item?"))return;upd(id,c=>{c.inv.splice(idx,1);});}
function addPower(id){if(!window.requireAuth())return;const n=prompt("Power name:");if(!n)return;const c2=prompt("Cost (e.g. 2 FP):","1 FP")||"1 FP";const t=prompt("Type (Universal/Light/Dark):","Universal")||"Universal";const d=prompt("Description:","")||"";upd(id,c=>{c.powers.push({n,c:c2,t,d});});}
function delPower(id,idx){if(!window.requireAuth())return;if(!confirm("Remove this power?"))return;upd(id,c=>{c.powers.splice(idx,1);});}
function editPower(id,idx){if(!window.requireAuth())return;const c=gc(id);const p=c.powers[idx];const n=prompt("Power name:",p.n);if(n===null)return;const c2=prompt("Cost:",p.c);if(c2===null)return;const d=prompt("Description:",p.d);if(d===null)return;upd(id,ch=>{ch.powers[idx]={...ch.powers[idx],n,c:c2,d};});}
function addDT(id){if(!window.requireAuth())return;const a=prompt("Downtime activity:");if(!a)return;const r=prompt("Result / notes:","Pending...")||"Pending...";upd(id,c=>{c.dt.push({a,r,s:"pending"});});}
function dDT(id,i){if(!window.requireAuth())return;if(!confirm("Remove entry?"))return;upd(id,c=>{c.dt.splice(i,1);});}
function eDT(id,i,f){if(!window.requireAuth())return;const c=gc(id);const v=prompt("Edit:",f==="a"?c.dt[i].a:c.dt[i].r);if(v!==null)upd(id,c=>{if(f==="a")c.dt[i].a=v;else c.dt[i].r=v;});}
function cDT(id,i){if(!window.requireAuth())return;const ord=["pending","success","fail"];upd(id,c=>{c.dt[i].s=ord[(ord.indexOf(c.dt[i].s)+1)%3];});}
function setBond(id,ri,val){if(!window.requireDM())return;upd(id,c=>{c.rels[ri].b=c.rels[ri].b===val?val-1:val;});}
function eRelNote(id,ri){if(!window.requireDM())return;const c=gc(id);const v=prompt("Edit note:",c.rels[ri].note);if(v!==null)upd(id,c=>{c.rels[ri].note=v;});}
function sNotes(id,val){if(!window.isAuthed()){render();return;}const c=gc(id);c.notes=val;if(window.fbPushChar)window.fbPushChar(c);}
function editFaction(key){if(!window.requireDM())return;const v=prompt("Set "+key+" (0-100):",FACTION[key].v);if(v===null)return;FACTION[key].v=Math.max(0,Math.min(100,parseInt(v)||0));render();if(window.fbPushFaction)window.fbPushFaction();}
function renderChar(c){
  const hcol=c.hp<1?"#d45b5b":c.hp<c.hpMax*.3?"#d4873a":"#3dba7e";
  const fpPips=Array.from({length:c.fpMax},(_,i)=>`<div class="fppip${i<c.fp?" on":""}" onclick="tFP('${c.id}',${i})"></div>`).join("");
  const abItems=Object.entries(c.abs).map(([k,[s,m]])=>`<div class="abb" onclick="editAb('${c.id}','${k}')" title="Click to edit ${k}"><div class="abn">${k}</div><div class="absc">${s}</div><div class="abm">${ms(m)}</div></div>`).join("");
  const saves=c.saves.map((sv,i)=>`<div class="skr" onclick="toggleProf('${c.id}','save',${i})" title="Click to cycle proficiency"><div class="skp${sv.e?" ex":sv.p?" pr":""}"></div><span>${sv.n}</span><span class="skv">${sv.m}</span></div>`).join("");
  const skills=c.skills.map((sk,i)=>`<div class="skr" onclick="toggleProf('${c.id}','skill',${i})" title="Click to cycle proficiency"><div class="skp${sk.e?" ex":sk.p?" pr":""}"></div><span>${sk.n}</span><span class="skv">${sk.m}</span></div>`).join("");
  const powers=c.powers.map((p,i)=>`<div class="pwr"><div style="cursor:pointer" onclick="editPower('${c.id}',${i})" title="Click to edit"><div class="pwn">${p.n}</div><div class="pwd">${p.d}</div></div><div class="pwc">${p.c}</div><div class="pwt">${p.t}</div><button class="dbtn" onclick="delPower('${c.id}',${i})">x</button></div>`).join("");
  const rc={standard:"rs",uncommon:"ru",rare:"rr",legendary:"rl"};
  const inv=c.inv.map((item,idx)=>`<tr><td>${item.n}</td><td>${item.q}</td><td>${item.w}</td><td><span class="rar ${rc[item.r]||"rs"}">${item.r}</span></td><td style="color:var(--txt2);font-size:11px">${item.d}</td><td><button class="dbtn" onclick="delItem('${c.id}',${idx})">x</button></td></tr>`).join("");
  const ds={success:"ss",pending:"sp",fail:"sf"};
  const dt=c.dt.map((d,i)=>`<div class="dtc"><div><div class="dta" onclick="eDT('${c.id}',${i},'a')">${d.a}</div><div class="dtr" onclick="eDT('${c.id}',${i},'r')">${d.r}</div></div><button class="dtst ${ds[d.s]}" onclick="cDT('${c.id}',${i})">${d.s.toUpperCase()}</button><button class="dbtn" onclick="dDT('${c.id}',${i})">x</button></div>`).join("");
  const isDM=window.isDM&&window.isDM();
  const rels=c.rels.map((r,ri)=>{
    const pips=Array.from({length:5},(_,i)=>`<div class="bondp${i<r.b?" on":""}${isDM?" dm-pip":""}"${isDM?` onclick="setBond('${c.id}',${ri},${i+1})"`:""} ></div>`).join("");
    return `<div class="relr"><div class="relic">${r.ic}</div><div><div class="reln">${r.n}</div><div class="relro">${r.ro}</div><div class="relnote${isDM?" dm-edit":""}"${isDM?` onclick="eRelNote('${c.id}',${ri})"`:""} >${r.note}</div><div class="bondm">${pips}</div></div></div>`;
  }).join("");
  const portInner=c.portrait?`<img src="${c.portrait}" alt="${c.name}">`:`<span>${c.em}</span>`;
  const portOverlay=isDM?`<div class="port-overlay"><button class="port-upload" onclick="window.uploadPortrait('${c.id}')">Upload Portrait</button></div><span class="pstat" id="pstat_${c.id}"></span>`:"";
  return `<div class="cl"><aside class="sb">
    <div class="port">${portInner}${portOverlay}<div class="plbl">${c.lbl}</div></div>
    <div>
      <div class="charname edclick" onclick="editName('${c.id}')" title="Click to edit">${c.name}</div>
      <div style="font-family:var(--fm);font-size:9px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;cursor:pointer" onclick="editSpecies('${c.id}')" title="Click to edit">${c.species}</div>
      <div style="font-size:13px;color:${c.col};margin-top:5px;font-weight:500;cursor:pointer" onclick="editCls('${c.id}')" title="Click to edit">${c.cls}</div>
    </div>
    <div class="sblk"><div class="blbl">Hit Points</div>
      <div class="hprow"><button class="hpbtn" onclick="aHP('${c.id}',-1)">-</button><div style="display:flex;align-items:baseline;gap:4px;flex:1;justify-content:center"><span class="hpnum" style="color:${hcol}" onclick="sHP('${c.id}')" title="Click to set">${c.hp}</span><span class="hpsep">/</span><span class="hpmax edclick" onclick="editMaxHP('${c.id}')" title="Click to set max">${c.hpMax}</span></div><button class="hpbtn" onclick="aHP('${c.id}',1)">+</button></div>
      <div class="tmphp" onclick="sTemp('${c.id}')">${c.hpTemp?"+"+c.hpTemp+" temp HP":"+ Add temp HP"}</div>
    </div>
    <div class="sblk"><div class="blbl">Force Points</div>
      <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:4px"><span style="font-family:var(--fd);font-size:20px;font-weight:700;color:#9b7fe8;line-height:1">${c.fp}</span><span style="color:var(--txt3)">/</span><span class="edclick" style="font-family:var(--fd);font-size:16px;color:var(--txt3)" onclick="editMaxFP('${c.id}')" title="Click to set max">${c.fpMax}</span></div>
      <div class="fprow">${fpPips}</div>
    </div>
    <div class="sblk"><div class="blbl">Combat</div><div class="mg">
      <div class="ms" onclick="editAC('${c.id}')" title="Click to edit"><div class="mv">${c.ac}</div><div class="ml">AC</div></div>
      <div class="ms" onclick="editInit('${c.id}')" title="Click to edit"><div class="mv">${c.init}</div><div class="ml">Init</div></div>
      <div class="ms" style="grid-column:1/-1" onclick="editSpd('${c.id}')" title="Click to edit"><div class="mv">${c.spd}</div><div class="ml">Speed</div></div>
    </div></div>
  </aside>
  <div class="cm">
    <div class="sec"><div class="sch"><span class="sct">Ability Scores</span><span class="edit-hint">Click to edit</span></div><div class="scb"><div class="abg">${abItems}</div></div></div>
    <div class="sec"><div class="sch"><span class="sct">Saves &amp; Skills</span><span class="edit-hint">Click pip to cycle: none / prof / expertise</span></div><div class="scb"><div class="ssg"><div><div class="blbl" style="margin-bottom:5px">Saving Throws</div>${saves}</div><div><div class="blbl" style="margin-bottom:5px">Skills</div>${skills}</div></div><div style="margin-top:6px;font-family:var(--fm);font-size:9px;color:var(--txt3)"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amber);margin-right:4px"></span>Proficient &nbsp;<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px"></span>Expertise</div></div></div>
    <div class="sec"><div class="sch"><span class="sct">Force Powers</span><button class="abtn" onclick="addPower('${c.id}')">+ Add</button></div><div class="scb">${powers||'<div style="font-size:12px;color:var(--txt3)">No powers yet.</div>'}</div></div>
    <div class="sec"><div class="sch"><span class="sct">Inventory</span><button class="abtn" onclick="addItem('${c.id}')">+ Add item</button></div><div class="scb"><table class="inv"><thead><tr><th>Item</th><th>Qty</th><th>Wt</th><th>Rarity</th><th>Notes</th><th></th></tr></thead><tbody>${inv||"<tr><td colspan='6' style='color:var(--txt3);font-size:12px;padding:8px 6px'>No items.</td></tr>"}</tbody></table><div class="crrow"><span class="crv" onclick="sCr('${c.id}')" title="Click to edit">${c.credits.toLocaleString()}</span><span class="crl">credits</span></div></div></div>
    <div class="sec"><div class="sch"><span class="sct">Downtime</span><button class="abtn" onclick="addDT('${c.id}')">+ Add entry</button></div><div class="scb">${dt||'<div style="font-size:12px;color:var(--txt3)">No entries yet.</div>'}</div></div>
    <div class="sec"><div class="sch"><span class="sct">Relationships &amp; Bonds</span>${isDM?'<span class="edit-hint">DM edit active</span>':'<span class="edit-hint">View only</span>'}</div><div class="scb"><div>${rels}</div><div style="margin-top:6px;font-family:var(--fm);font-size:9px;color:var(--txt3)">Bond strength 1-5 · 3+ = Bond Boon available</div></div></div>
    <div class="sec"><div class="sch"><span class="sct">Notes</span></div><div class="scb"><textarea class="notea" placeholder="Session notes, quest reminders, things to ask the DM..." oninput="sNotes('${c.id}',this.value)">${c.notes}</textarea><div class="noteh">Auto-saves to all players</div></div></div>
  </div></div>`;
}
function renderOps(){
  const fsc=Object.entries(FACTION).map(([k,f])=>`<div class="fsc"><div class="fsh"><span class="fsk">${k}</span><span class="fsv edclick" style="color:${f.col};border-bottom-color:${f.col}" onclick="editFaction('${k}')" title="DM: click to edit">${f.v}</span></div><div class="fsb"><div style="height:100%;border-radius:2px;background:${f.col};width:${Math.min(f.v,100)}%"></div></div><div class="fsd">${f.d}</div></div>`).join("");
  const ds={success:"ss",pending:"sp",fail:"sf"};
  const charDt=chars.map(c=>{const cards=c.dt.map(d=>`<div class="dtgc"><div style="font-size:13px;font-weight:500;color:var(--txtb);margin-bottom:2px">${d.a}</div><div style="font-size:11px;color:var(--txt2);line-height:1.4;margin-bottom:5px">${d.r}</div><span class="dtst ${ds[d.s]}" style="cursor:default">${d.s.toUpperCase()}</span></div>`).join("");return `<div style="margin-bottom:.9rem"><div class="ocl" style="color:${c.col}">${c.name}</div><div class="dtg">${cards}</div></div>`;}).join("");
  const evs=EVENTS.map((e,i)=>`<div class="evr" style="border-bottom:${i<EVENTS.length-1?"1px solid var(--bdr)":"none"}"><div class="evs">Sess. ${e.s}</div><div><div class="evt">${e.t}</div><div class="evd">${e.d}</div></div><span class="eve ${e.pos?"ep":"en"}">${e.e}</span></div>`).join("");
  return `<div class="opspg"><div><div class="pgt">Operations</div><div class="pgs">REBEL CELL - DOWNTIME LOG &amp; FACTION STATUS</div></div><div class="sec"><div class="sch"><span class="sct">Cell Faction Stats</span><span class="edit-hint">${window.isDM&&window.isDM()?"DM: click values to edit":"View only"}</span></div><div class="scb"><div class="fsg">${fsc}</div><div style="margin-top:7px;font-family:var(--fm);font-size:9px;color:var(--txt3);letter-spacing:.08em">+1 IMPERIAL ALERTNESS PER SESSION</div></div></div><div class="sec"><div class="sch"><span class="sct">Downtime Log - Current Arc</span></div><div class="scb">${charDt}</div></div><div class="sec"><div class="sch"><span class="sct">Galactic Event Log</span></div><div class="scb"><div>${evs}</div></div></div></div>`;
}
function renderShips(){
  const bmap={r:"sfbr",vi:"sfbvi",vo:"sfbv"};
  const cards=SHIPS.map((s,i)=>{
    const uid="sh"+i;
    const abstr=s.abs.map((v,j)=>`<div class="sab"><div class="sabn">${ABKEYS[j]}</div><div class="sabs">${v}</div><div class="sabm">${ms(Math.floor((v-10)/2))}</div></div>`).join("");
    const acts=s.actions.filter(a=>a.t==="a");const reacts=s.actions.filter(a=>a.t==="r");
    return `<div class="shpc"><div class="shch"><span class="sfb ${bmap[s.badge]||"sfbr"}">${s.faction}</span><div class="shn">${s.name}</div><div class="shcl">${s.cls}</div></div><div class="shtabs"><button class="shtab active" onclick="shTab('${uid}','st',this)">Stats</button><button class="shtab" onclick="shTab('${uid}','wp',this)">Weapons</button><button class="shtab" onclick="shTab('${uid}','pi',this)">Pilot</button></div><div id="${uid}_st" class="shpn active"><div class="shsr">${[["AC",s.ac],["HP",s.hp],["Shields",s.sp],["Regen",s.regen],["Speed",s.spd]].map(([l,v])=>`<div class="shst"><div class="sssv">${v}</div><div class="sssl">${l}</div></div>`).join("")}</div><div class="shbl"><span>Hull</span><span>${s.hp} HP</span></div><div class="shb"><div style="height:100%;border-radius:2px;background:#3dba7e;width:${Math.round(s.hp/80*100)}%"></div></div><div class="shbl"><span>Shields</span><span>${s.sp} SP</span></div><div class="shb"><div style="height:100%;border-radius:2px;background:#5b9bd5;width:${Math.round(s.sp/50*100)}%"></div></div><div class="shab">${abstr}</div><div class="shsl">Ship Traits</div>${s.traits.map(t=>`<div class="shtr"><strong style="color:var(--txtb)">${t.n}.</strong> ${t.d}</div>`).join("")}</div><div id="${uid}_wp" class="shpn"><div class="shsl">Actions</div>${acts.map((a,j)=>`<div class="shac" style="border-bottom:${j<acts.length-1?"1px solid var(--bdr)":"none"}"><div class="shah"><span class="shan">${a.n}</span><span class="shau">${a.u}</span><span class="shat">Action</span></div><div class="shad">${a.d}</div></div>`).join("")}<div class="shsl" style="margin-top:.75rem">Reactions</div>${reacts.map((a,j)=>`<div class="shac" style="border-bottom:${j<reacts.length-1?"1px solid var(--bdr)":"none"}"><div class="shah"><span class="shan">${a.n}</span><span class="shau">${a.u}</span><span class="shat">Reaction</span></div><div class="shad">${a.d}</div></div>`).join("")}</div><div id="${uid}_pi" class="shpn"><div class="pilotnote"><strong>Pilot Guidance</strong>${s.pilot}</div></div></div>`;
  }).join("");
  return `<div class="shpg"><div style="padding:.9rem 0 .75rem"><div class="pgt">Cell Ships</div><div class="pgs">REBEL ALLIANCE - REGISTERED VESSELS</div></div><div class="shgg">${cards}</div></div>`;
}
function shTab(uid,pane,btn){["st","wp","pi"].forEach(p=>{const el=document.getElementById(uid+"_"+p);if(el)el.classList.toggle("active",p===pane)});btn.closest(".shtabs").querySelectorAll(".shtab").forEach(b=>b.classList.remove("active"));btn.classList.add("active")}
function buildNav(){let h="";chars.forEach(c=>{h+=`<button class="nb${activePg==="char_"+c.id?" active":""}" onclick="showPg('char_${c.id}',this)">${c.name.split(" ")[0]}</button>`;});h+=`<div class="ndiv"></div>`;h+=`<button class="nb${activePg==="ops"?" active":""}" onclick="showPg('ops',this)">Operations</button>`;h+=`<button class="nb${activePg==="ships"?" active":""}" onclick="showPg('ships',this)">Ships</button>`;document.getElementById("nav").innerHTML=h;}
function render(){
  const badge=document.getElementById("dmbadge");if(badge)badge.style.display=(window.isDM&&window.isDM())?"inline":"none";
  buildNav();let h="";
  chars.forEach(c=>{h+=`<div class="pg${activePg==="char_"+c.id?" active":""}" id="pg_char_${c.id}">${renderChar(c)}</div>`;});
  h+=`<div class="pg${activePg==="ops"?" active":""}" id="pg_ops">${renderOps()}</div>`;
  h+=`<div class="pg${activePg==="ships"?" active":""}" id="pg_ships">${renderShips()}</div>`;
  document.getElementById("pages").innerHTML=h;
}
function showPg(id,btn){activePg=id;document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".pg").forEach(p=>p.classList.remove("active"));const pg=document.getElementById("pg_"+id);if(pg)pg.classList.add("active");btn.classList.add("active");}
window.chars=chars;window.FACTION=FACTION;window.render=render;
render();window.dispatchEvent(new Event("appReady"));
</script>
</body>
</html>
