<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Registry — SW5e</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const DM_EMAIL = "alexander.darthmoor@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyB7N0A8eBdQVRhnD57GFOhdSNSR75yZLZg",
  authDomain: "sw-homebrew.firebaseapp.com",
  projectId: "sw-homebrew",
  storageBucket: "sw-homebrew.firebasestorage.app",
  messagingSenderId: "426994499491",
  appId: "1:426994499491:web:997aad0b1954fd1293a416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.isDM = () => currentUser && currentUser.email === DM_EMAIL;
window.isAuthed = () => !!currentUser;

window.handleAuth = () => {
  if (currentUser) {
    signOut(auth);
    return;
  }
  signInWithPopup(auth, provider)
    .then(result => updateAuthUI(result.user))
    .catch(e => {
      if (e.code === 'auth/popup-blocked') {
        signInWithRedirect(auth, provider);
      } else {
        console.warn("Sign in error:", e.code, e.message);
      }
    });
};

window.requireAuth = function() {
  if (currentUser) return true;
  if (confirm("Sign in with Google to make changes?")) {
    signInWithPopup(auth, provider)
      .then(result => updateAuthUI(result.user))
      .catch(e => console.warn("Sign in error:", e.code));
  }
  return false;
};

window.requireDM = function() {
  if (window.isDM()) return true;
  alert("Only the DM can edit this.");
  return false;
};

function updateAuthUI(user) {
  currentUser = user;
  const btn = document.getElementById("authbtn");
  const label = document.getElementById("authlabel");
  const badge = document.getElementById("dmbadge");
  if (!btn) return;
  if (user) {
    if (label) label.textContent = user.displayName || user.email;
    btn.textContent = "Sign out";
    if (badge) badge.style.display = window.isDM() ? "inline" : "none";
  } else {
    if (label) label.textContent = "";
    btn.textContent = "Sign in";
    if (badge) badge.style.display = "none";
  }
  if (window.render) window.render();
}

onAuthStateChanged(auth, user => {
  console.log("onAuthStateChanged fired:", user ? user.email : "null");
  updateAuthUI(user);
});

getRedirectResult(auth)
  .then(result => {
    console.log("getRedirectResult:", result ? result.user?.email : "null");
    if (result?.user) updateAuthUI(result.user);
  })
  .catch(e => console.warn("Redirect result error:", e.code, e.message));

const LIVE_CHAR_FIELDS = ["hp","hpTemp","fp","credits","inv","wpns","dt","rels","notes"];

async function pushChar(c) {
  if (!currentUser) return;
  const payload = {};
  LIVE_CHAR_FIELDS.forEach(f => { if (c[f] !== undefined) payload[f] = c[f]; });
  await setDoc(doc(db, "campaign", "chars_" + c.id), payload, { merge: true });
}

async function pushFaction() {
  if (!currentUser) return;
  await setDoc(doc(db, "campaign", "faction"), window.FACTION, { merge: true });
}

window.fbPushChar = pushChar;
window.fbPushFaction = pushFaction;

// Codex Firestore sync
window.fbGetCodex = async function() {
  try {
    const snap = await getDoc(doc(db, "campaign", "codex"));
    if (snap.exists()) return snap.data();
  } catch(e) { console.warn("Codex load error", e); }
  return null;
};
window.fbSaveCodex = async function(data) {
  if (!currentUser) return;
  try { await setDoc(doc(db, "campaign", "codex"), data, { merge: false }); }
  catch(e) { console.warn("Codex save error", e); }
};

async function loadFromFirestore() {
  for (const c of window.chars) {
    try {
      const snap = await getDoc(doc(db, "campaign", "chars_" + c.id));
      if (snap.exists()) {
        const d = snap.data();
        LIVE_CHAR_FIELDS.forEach(f => { if (d[f] !== undefined) c[f] = d[f]; });
      }
    } catch(e) { console.warn("Could not load char", c.id, e); }
  }
  try {
    const snap = await getDoc(doc(db, "campaign", "faction"));
    if (snap.exists()) {
      const d = snap.data();
      Object.keys(window.FACTION).forEach(k => {
        if (d[k] !== undefined) window.FACTION[k] = d[k];
      });
    }
  } catch(e) { console.warn("Could not load faction", e); }

  window.render();
  const ss = document.getElementById("syncstatus");
  if (ss) ss.textContent = "LIVE — REBEL ALLIANCE ENCRYPTED";

  window.chars.forEach(c => {
    onSnapshot(doc(db, "campaign", "chars_" + c.id), snap => {
      if (!snap.exists()) return;
      const d = snap.data();
      LIVE_CHAR_FIELDS.forEach(f => { if (d[f] !== undefined) c[f] = d[f]; });
      window.render();
    });
  });

  onSnapshot(doc(db, "campaign", "faction"), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    Object.keys(window.FACTION).forEach(k => {
      if (d[k] !== undefined) window.FACTION[k] = d[k];
    });
    window.render();
  });
}

function waitForApp() {
  if (window.chars && window.render && window.FACTION) loadFromFirestore();
  else setTimeout(waitForApp, 50);
}
waitForApp();
</script>

function watkBonus(c,w){
  const abMap={};
  Object.entries(c.abs).forEach(([k,[s]])=>{abMap[k]=mod(s);});
  const base=abMap[w.ab]||0;
  return ms(base+(w.prof?3:0));
}
function addWpn(id){
  if(!window.requireAuth())return;
  const n=prompt("Weapon name:");if(!n)return;
  const ab=prompt("Ability (STR/DEX/CON/INT/WIS/CHA):","STR")||"STR";
  const prof=confirm("Proficient?");
  const dmg=prompt("Damage dice (e.g. 1d8):","1d8")||"1d8";
  const dtype=prompt("Damage type (Energy/Kinetic/Ion):","Energy")||"Energy";
  const range=prompt("Range (e.g. Melee or 60/240 ft.):","Melee")||"Melee";
  const notes=prompt("Notes:","")||"";
  upd(id,c=>{if(!c.wpns)c.wpns=[];c.wpns.push({n,ab:ab.toUpperCase(),prof:prof?1:0,dmg,dtype,range,notes});});
}
function delWpn(id,idx){
  if(!window.requireAuth())return;

  upd(id,c=>{c.wpns.splice(idx,1);});
}
function editAb(id,ab){
  const c=gc(id);const v=prompt("Set "+ab+" score (1-30):",c.abs[ab][0]);if(v===null)return;
  const n=Math.max(1,Math.min(30,parseInt(v)||c.abs[ab][0]));
  upd(id,c=>{c.abs[ab]=[n,mod(n)];});
}
function toggleProf(id,type,idx){
  upd(id,c=>{
    const arr=type==="save"?c.saves:c.skills;const item=arr[idx];

  });
}

function rollWpnDmg(id,idx){
  const c=gc(id);const w=c.wpns[idx];
  const [num,die]=w.dmg.split("d").map(Number);
  const abMap={};
  Object.entries(c.abs).forEach(([k,[s]])=>{abMap[k]=mod(s);});
  const dmgMod=abMap[w.ab]||0;
  let total=0;const rolls=[];
  for(let i=0;i<num;i++){const r=Math.ceil(Math.random()*die);rolls.push(r);total+=r;}
  const dmgTotal=total+dmgMod;
  const atk=watkBonus(c,w);
  const modStr=dmgMod>=0?"+"+dmgMod:String(dmgMod);
  // Select correct die in panel and open it
  const panel=document.getElementById("dice-panel");
  if(panel)panel.classList.add("open");
  // Update die selector to show correct die
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const dieEl=document.getElementById("die"+die);
  if(dieEl)dieEl.classList.add("active");
  else document.getElementById("diecustom").classList.add("active");
  document.getElementById("dicecount").textContent=num;
  diceState.die=die;diceState.count=num;
  // Show result
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  if(res&&tot&&brk&&lbl){
    res.classList.add("show");
    tot.textContent=dmgTotal;
    tot.className="dp-total";
    brk.textContent=rolls.join(" + ")+(dmgMod!==0?" "+modStr:"")+(num>1||dmgMod!==0?" = "+dmgTotal:"");
    lbl.textContent=w.n+" · "+w.dmg+modStr+" "+w.dtype+" · Atk: "+atk;
    rollHistory.unshift({label:w.n+" dmg",total:dmgTotal,isCrit:false,isFail:false,breakdown:rolls.join("+")+(dmgMod!==0?modStr:"")});
    if(rollHistory.length>10)rollHistory.pop();
    renderHistory();
  }
}
function rollWpnAtk(id,idx){
  const c=gc(id);const w=c.wpns[idx];
  const abMap={};
  Object.entries(c.abs).forEach(([k,[s]])=>{abMap[k]=mod(s);});
  const atkMod=(abMap[w.ab]||0)+(w.prof?PROF:0);
  const adv=diceState.adv;
  let r1=Math.ceil(Math.random()*20);
  let r2=Math.ceil(Math.random()*20);
  let chosen,breakdown;
  if(adv==="adv"){chosen=Math.max(r1,r2);breakdown="Adv: ["+r1+", "+r2+"] → "+chosen;}
  else if(adv==="dis"){chosen=Math.min(r1,r2);breakdown="Dis: ["+r1+", "+r2+"] → "+chosen;}
  else{chosen=r1;breakdown="d20: "+r1;}
  const total=chosen+atkMod;
  const isCrit=chosen===20;
  const isFail=chosen===1;
  const modStr=atkMod>=0?"+"+atkMod:String(atkMod);
  // Open panel, select d20
  const panel=document.getElementById("dice-panel");
  if(panel)panel.classList.add("open");
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const d20el=document.getElementById("die20");
  if(d20el)d20el.classList.add("active");
  diceState.die=20;diceState.count=1;
  document.getElementById("dicecount").textContent=1;
  document.getElementById("advrow").style.display="flex";
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  if(res&&tot&&brk&&lbl){
    res.classList.add("show");
    tot.textContent=total;
    tot.className="dp-total"+(isCrit?" crit":isFail?" fail":"");
    brk.textContent=breakdown+" "+modStr+" = "+total;
    lbl.textContent=w.n+" attack"+(isCrit?" — CRITICAL HIT!":isFail?" — CRITICAL FAIL":"");
    rollHistory.unshift({label:w.n+" atk",total,isCrit,isFail,breakdown:breakdown+modStr});
    if(rollHistory.length>10)rollHistory.pop();
    renderHistory();
  }
}

// ── Dice Roller ───────────────────────────────────────────────────────────
let diceState={die:20,count:1,adv:"nor"};
let rollHistory=[];

function toggleDice(){
  const p=document.getElementById("dice-panel");
  p.classList.toggle("open");
}

function selDie(n){
  diceState.die=n;
  diceState.count=1;
  document.getElementById("dicecount").textContent=1;
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const el=document.getElementById("die"+n);
  if(el)el.classList.add("active");
  // Only show adv/dis row for d20
  document.getElementById("advrow").style.display=n===20?"flex":"none";
}

function adjCount(d){
  diceState.count=Math.max(1,Math.min(20,diceState.count+d));
  document.getElementById("dicecount").textContent=diceState.count;
}

function setAdv(mode){
  diceState.adv=mode;
  document.getElementById("advbtn").className="dp-advbtn"+(mode==="adv"?" adv-on":"");
  document.getElementById("disbtn").className="dp-advbtn"+(mode==="dis"?" dis-on":"");
  document.getElementById("norbtn").className="dp-advbtn";
}

function rollOne(sides){return Math.floor(Math.random()*sides)+1;}

function doRoll(overrideDie,overrideCount,label){
  const die=overrideDie||diceState.die;
  const count=overrideCount||diceState.count;
  const adv=diceState.adv;
  let rolls=[];
  let total=0;
  let breakdown="";
  let resultLabel=label||(count+"d"+die);
  let isCrit=false;
  let isFail=false;

  if(die===20&&count===1&&adv!=="nor"){
    const r1=rollOne(20);const r2=rollOne(20);
    const chosen=adv==="adv"?Math.max(r1,r2):Math.min(r1,r2);
    total=chosen;
    breakdown=(adv==="adv"?"Adv":"Dis")+": ["+r1+", "+r2+"] → "+chosen;
    isCrit=chosen===20;
    isFail=chosen===1;
    resultLabel+=(adv==="adv"?" (Advantage)":" (Disadvantage)");
  } else {
    for(let i=0;i<count;i++){const r=rollOne(die);rolls.push(r);total+=r;}
    breakdown=rolls.join(" + ")+(count>1?" = "+total:"");
    if(die===20&&count===1){isCrit=total===20;isFail=total===1;}
  }

  // Update result display
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  res.classList.add("show");
  tot.textContent=total;
  tot.className="dp-total"+(isCrit?" crit":isFail?" fail":"");
  brk.textContent=breakdown;
  lbl.textContent=resultLabel+(isCrit?" — CRITICAL HIT!":isFail?" — CRITICAL FAIL":"");

  // Add to history
  rollHistory.unshift({label:resultLabel,total,isCrit,isFail,breakdown});
  if(rollHistory.length>10)rollHistory.pop();
  renderHistory();
}

function renderHistory(){
  const h=document.getElementById("dphist");
  if(!rollHistory.length){h.innerHTML="";return;}
  h.innerHTML=rollHistory.map(r=>`<div class="dp-hrow"><span class="dp-hlbl">${r.label}</span><span class="dp-hval${r.isCrit?" hcrit":r.isFail?" hfail":""}">${r.total}${r.isCrit?" ★":r.isFail?" ✕":""}</span></div>`).join("");
}

function rollCustom(){
  const input=prompt("Enter dice notation (e.g. 2d6, 1d8+3, 3d4):");
  if(!input)return;
  const match=input.trim().match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if(!match){alert("Format: NdN or NdN+bonus (e.g. 2d6 or 1d8+3)");return;}
  const count=parseInt(match[1]);
  const die=parseInt(match[2]);
  const bonus=parseInt(match[3]||0);
  if(count<1||count>20||die<2){alert("Keep it between 1-20 dice and d2 minimum.");return;}
  let rolls=[];let total=0;
  for(let i=0;i<count;i++){const r=rollOne(die);rolls.push(r);total+=r;}
  total+=bonus;
  const breakdown=rolls.join(" + ")+(bonus!==0?(bonus>0?"+":"")+bonus:"")+(count>1||bonus!==0?" = "+total:"");
  // Show result
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  res.classList.add("show");
  tot.textContent=total;
  tot.className="dp-total";
  brk.textContent=breakdown;
  lbl.textContent=input.trim();
  rollHistory.unshift({label:input.trim(),total,isCrit:false,isFail:false,breakdown});
  if(rollHistory.length>10)rollHistory.pop();
  renderHistory();
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  document.getElementById("diecustom").classList.add("active");
}

     history:"Fulcrum agents assisted during the Fresia X-wing heist, drawing Imperial attention away from the facility.",historySecret:"The Alderaanian Resistance has a contingency plan — if Alderaan is ever directly threatened, every Fulcrum asset goes dark simultaneously and relocates to a pre-arranged rally point.",historyRevealed:false}
  ]
};

function cdxPortrait(entry,icon){
  if(entry.portrait) return `<img class="cdx-modal-img" src="${entry.portrait}" alt="${entry.name}">`;
  return `<div class="cdx-portrait-placeholder"><span class="cdx-portrait-placeholder-icon">${icon}</span><span class="cdx-portrait-placeholder-lbl">${entry.name}</span></div>`;
}

function cdxSecretField(type,id,field,label,secretText,revealed,isDM){
  const toggleFn=`toggleSecret('${type}','${id}','${field}')`;
  if(!isDM && !revealed){
    return `<div class="cdx-modal-field">
      <div class="cdx-modal-lbl">${label}</div>
      <div class="cdx-secret-locked">
        <span class="cdx-secret-locked-txt">🔒 CLASSIFIED</span>
      </div>
    </div>`;
  }
  if(isDM && !revealed){
    return `<div class="cdx-modal-field">
      <div class="cdx-modal-lbl" style="display:flex;align-items:center;justify-content:space-between">${label} <button class="cdx-reveal-btn" onclick="${toggleFn}">Reveal to players</button></div>
      <div class="cdx-secret-locked">
        <span class="cdx-secret-locked-txt">🔒 Hidden — ${secretText}</span>
      </div>
    </div>`;
  }
  // Revealed
  return `<div class="cdx-modal-field">
    <div class="cdx-modal-lbl" style="display:flex;align-items:center;justify-content:space-between">${label} ${isDM?`<button class="cdx-reveal-btn revealed" onclick="${toggleFn}">Re-hide</button>`:''}</div>
    <div class="cdx-secret-revealed">
      <div class="cdx-secret-label">★ REVEALED</div>
      <div class="cdx-secret-text">${secretText}</div>
    </div>
  </div>`;
}

function toggleSecret(type,id,field){
  if(!window.requireDM())return;
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  const revField=field+'Revealed';
  entry[revField]=!entry[revField];
  saveCodex();
  // Re-open modal with updated data
  openCodexModal(type,id);
}
window.toggleSecret=toggleSecret;

function openCodexModal(type,id){
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  const isDM=window.isDM&&window.isDM();
  document.getElementById("cdxModalTitle").textContent=entry.name;

    html+=cdxPortrait(entry,"👤");

    if(entry.threat)html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Threat Level</div><div class="cdx-modal-val"><span class="cdx-badge threat-${entry.threat}">${entry.threat} threat</span></div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Status</div><div class="cdx-modal-val">${cdxStatusBadge(entry.status)}</div></div>`;
    // Location

    html+=cdxSecretField(type,id,'location','Location Secret',entry.locationSecret,entry.locationRevealed,isDM);
    // Description
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=cdxSecretField(type,id,'description','Description Secret',entry.descriptionSecret,entry.descriptionRevealed,isDM);
    // History
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">History</div><div class="cdx-modal-val">${entry.history}</div></div>`;
    html+=cdxSecretField(type,id,'history','History Secret',entry.historySecret,entry.historyRevealed,isDM);
    // Relationships
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Relationships</div><div class="cdx-modal-val">${entry.rels}</div></div>`;
    html+=cdxSecretField(type,id,'rels','Relationships Secret',entry.relsSecret,entry.relsRevealed,isDM);
  } else if(type==="planets"){
    html+=cdxPortrait(entry,"🌍");
    html+=`<div class="cdx-modal-body">`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Region</div><div class="cdx-modal-val">${entry.region}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Imperial Presence</div><div class="cdx-modal-val">${cdxControlBadge(entry.control)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=cdxSecretField(type,id,'description','Description Secret',entry.descriptionSecret,entry.descriptionRevealed,isDM);
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Notable Locations</div><div class="cdx-modal-val">${entry.locations}</div></div>`;
    html+=cdxSecretField(type,id,'locations','Locations Secret',entry.locationsSecret,entry.locationsRevealed,isDM);
  } else {
    html+=cdxPortrait(entry,"🏛️");
    html+=`<div class="cdx-modal-body">`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Type</div><div class="cdx-modal-val">${cdxTypeBadge(entry.type)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Disposition</div><div class="cdx-modal-val">${cdxDispBadge(entry.disposition)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=cdxSecretField(type,id,'description','Description Secret',entry.descriptionSecret,entry.descriptionRevealed,isDM);
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">History</div><div class="cdx-modal-val">${entry.history}</div></div>`;

      <button class="abtn" onclick="closeCodexModal();toggleHidden('${type}','${id}')">${entry.hidden?"Reveal entry":"Hide entry"}</button>
      <button class="abtn" style="color:var(--red)" onclick="closeCodexModal();deleteCodexEntry('${type}','${id}')">Delete</button>
    </div>`;
  }

function closeCodexModal(){

window.openCodexModal=openCodexModal;

async function loadCodex(){
  if(codexLoaded)return;
  if(window.fbGetCodex){
    const data=await window.fbGetCodex();
    if(data){
      codexData=data;
      if(!codexData.villains)codexData.villains=JSON.parse(JSON.stringify(VILLAIN_DEFAULTS));
      codexLoaded=true;return;
    }
  }
  codexData=JSON.parse(JSON.stringify(CODEX_DEFAULTS));
  codexData.villains=JSON.parse(JSON.stringify(VILLAIN_DEFAULTS));
  codexLoaded=true;
}

async function saveCodex(){
  if(window.fbSaveCodex) await window.fbSaveCodex(codexData);
}

function cdxStatusBadge(s){const m={alive:"st-alive",missing:"st-missing",dead:"st-dead",unknown:"st-unknown"};return`<span class="cdx-badge ${m[s]||"st-unknown"}">${s}</span>`;}
function cdxTypeBadge(t){const m={jedi:"ot-jedi",rebel:"ot-rebel",imperial:"ot-imperial",criminal:"ot-criminal",neutral:"ot-neutral"};return`<span class="cdx-badge ${m[t]||"ot-neutral"}">${t}</span>`;}
function cdxControlBadge(c){const m={none:"ic-none",partial:"ic-partial",occupied:"ic-occupied",lockdown:"ic-lockdown"};const l={none:"No Imperial Presence",partial:"Partial Control",occupied:"Occupied",lockdown:"Lockdown"};return`<span style="font-family:var(--fm);font-size:9px;font-weight:600" class="${m[c]||"ic-partial"}">${l[c]||c}</span>`;}
function cdxDispBadge(d){const m={allied:"dp-allied",hostile:"dp-hostile",neutral:"dp-neutral",unknown:"dp-unknown"};return`<span style="font-family:var(--fm);font-size:10px;font-weight:600" class="${m[d]||"dp-neutral"}">${d}</span>`;}

function addCodexEntry(type){
  if(!window.requireDM())return;
  const name=prompt("Name:");if(!name)return;
  const entry={id:type+Date.now(),name,hidden:false};
  if(type==="npcs"||type==="villains"){
    entry.affiliation=prompt("Affiliation:","")||"";
    entry.status=prompt("Status (alive/missing/dead/unknown):","alive")||"alive";
    if(type==="villains")entry.threat=prompt("Threat level (low/moderate/high/critical):","moderate")||"moderate";
    entry.location=prompt("Last known location:","")||"Unknown";
    entry.portrait="";
    entry.description=prompt("Description:","")||"";
    entry.descriptionSecret="";entry.descriptionRevealed=false;
    entry.history=prompt("History:","")||"";
    entry.historySecret="";entry.historyRevealed=false;
    entry.rels=prompt("Relationships:","")||"";
    entry.relsSecret="";entry.relsRevealed=false;
    entry.locationSecret="";entry.locationRevealed=false;
  }else if(type==="planets"){
    entry.region=prompt("Region:","")||"";
    entry.control=prompt("Imperial control (none/partial/occupied/lockdown):","none")||"none";
    entry.description=prompt("Description:","")||"";
    entry.locations=prompt("Notable locations:","")||"";
  }else{
    entry.type=prompt("Type (jedi/rebel/imperial/criminal/neutral):","neutral")||"neutral";
    entry.disposition=prompt("Disposition (allied/neutral/hostile/unknown):","neutral")||"neutral";
    entry.description=prompt("Description:","")||"";
    entry.history=prompt("History:","")||"";
  }
  codexData[type].push(entry);
  saveCodex();
  render();
}

function editCodexEntry(type,id){
  if(!window.requireDM())return;
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  const field=prompt("Edit field:\nname / affiliation / status / location / portrait / description / history / rels (NPC)\nname / region / control / description / locations (Planet)\nname / type / disposition / description / history (Org)");
  if(!field)return;
  const val=prompt("New value:",entry[field]||"");
  if(val===null)return;
  entry[field]=val;
  saveCodex();
  render();
}

function toggleHidden(type,id){
  if(!window.requireDM())return;
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  entry.hidden=!entry.hidden;
  saveCodex();
  render();
}

function deleteCodexEntry(type,id){
  if(!window.requireDM())return;
  if(!confirm("Delete this entry?"))return;
  codexData[type]=codexData[type].filter(e=>e.id!==id);
  saveCodex();
  render();
}

function renderCodex(){
  const isDM=window.isDM&&window.isDM();

        `<div class="cdx-card-body">
          <div class="cdx-field"><div class="cdx-field-lbl">Region</div><div class="cdx-field-val">${e.region}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Imperial Presence</div><div class="cdx-field-val">${cdxControlBadge(e.control)}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Description</div><div class="cdx-field-val">${e.description}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Notable Locations</div><div class="cdx-field-val">${e.locations}</div></div>

// ── Force Power Picker ────────────────────────────────────────────────────
let sw5ePowers=[];
let ppkrFilter="all";
let ppkrCharId=null;
let ppkrSelected=null;

async function fetchSW5ePowers(){
  if(sw5ePowers.length)return;
  try{
    const r=await fetch("https://raw.githubusercontent.com/sw5e-org/sw5e/master/data/ForcePower.json");
    const data=await r.json();
    sw5ePowers=data.filter(p=>p.name).map(p=>({
      n:p.name,
      t:(p.powerType||p.school||"Universal"),
      c:p.level!==undefined?(p.level===0?"At-will":p.level+" FP"):"1 FP",
      d:p.description||p.desc||"",
      level:p.level||0
    }));
    sw5ePowers.sort((a,b)=>a.level-b.level||a.n.localeCompare(b.n));
  }catch(e){
    console.warn("SW5e fetch failed:",e);
    sw5ePowers=[{n:"Force Push/Pull",t:"Universal",c:"1 FP",d:"Move a creature or object up to 30 ft.",level:1},{n:"Saber Ward",t:"Light",c:"1 FP",d:"+2 AC until end of your next turn.",level:1},{n:"Battle Meditation",t:"Light",c:"2 FP",d:"Allies within 30 ft. gain advantage on one attack roll.",level:2},{n:"Force Camouflage",t:"Universal",c:"2 FP",d:"Invisible until you attack or cast a power.",level:2},{n:"Affect Mind",t:"Light",c:"1 FP",d:"DC WIS save or creature is charmed for 1 minute.",level:1},{n:"Telekinesis",t:"Universal",c:"2 FP",d:"Move objects or creatures. Concentration, 10 minutes.",level:2},{n:"Heal",t:"Light",c:"1-3 FP",d:"Restore 1d8 HP per FP. Touch range.",level:1},{n:"Force Lightning",t:"Dark",c:"2 FP",d:"2d6 lightning damage, DEX save for half.",level:2},{n:"Force Choke",t:"Dark",c:"2 FP",d:"Restrain and deal 1d6 kinetic damage per round.",level:2},{n:"Stun",t:"Universal",c:"2 FP",d:"CON save or stunned until end of next turn.",level:2}];
  }
  filterPowers();
}

function openPowerPicker(charId){
  if(!window.requireAuth())return;
  ppkrCharId=charId;
  ppkrSelected=null;
  ppkrFilter="all";
  document.getElementById("ppkrModal").classList.add("open");
  document.getElementById("ppkrSearch").value="";
  document.getElementById("ppkrCombat").style.display="none";
  document.getElementById("ppkrHasAtk").checked=false;
  document.getElementById("ppkrHasDmg").checked=false;
  document.getElementById("ppkrDmgInput").style.display="none";
  document.querySelectorAll(".ppkr-filter").forEach(b=>b.classList.remove("active"));
  document.getElementById("pf-all").classList.add("active");
  document.body.style.overflow="hidden";
  if(!sw5ePowers.length) fetchSW5ePowers();
  else filterPowers();
}

function closePowerPicker(){
  document.getElementById("ppkrModal").classList.remove("open");
  document.body.style.overflow="";
}

function setPowerFilter(f){
  ppkrFilter=f;
  document.querySelectorAll(".ppkr-filter").forEach(b=>b.classList.remove("active"));
  document.getElementById("pf-"+f).classList.add("active");
  filterPowers();
}

function filterPowers(){
  const q=(document.getElementById("ppkrSearch")?.value||"").toLowerCase();
  const list=document.getElementById("ppkrList");
  if(!list)return;
  if(!sw5ePowers.length){list.innerHTML='<div class="ppkr-loading">LOADING...</div>';return;}
  const filtered=sw5ePowers.filter(p=>{
    const typeMatch=ppkrFilter==="all"||p.t.toLowerCase().includes(ppkrFilter);
    const searchMatch=!q||p.n.toLowerCase().includes(q)||p.d.toLowerCase().includes(q);
    return typeMatch&&searchMatch;
  }).slice(0,50);
  if(!filtered.length){list.innerHTML='<div class="ppkr-loading">No powers found.</div>';return;}
  const typeColor={universal:"color:var(--blue)",light:"color:var(--green)",dark:"color:var(--red)"};
  list.innerHTML=filtered.map(p=>`
    <div class="ppkr-item" onclick="selectPower(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="ppkr-item-name">${p.n}</div>
      <div class="ppkr-item-meta">
        <span class="pwt" style="${typeColor[p.t.toLowerCase()]||''};border-color:currentColor">${p.t}</span>
        <span style="font-family:var(--fm);font-size:10px;color:var(--purple)">${p.c}</span>
      </div>
      <div class="ppkr-item-desc">${p.d.slice(0,120)}${p.d.length>120?"...":""}</div>
    </div>`).join("");
}

function selectPower(p){
  ppkrSelected=p;
  document.getElementById("ppkrSelectedName").textContent=p.n;
  document.getElementById("ppkrCombat").style.display="block";
  document.getElementById("ppkrHasAtk").checked=false;
  document.getElementById("ppkrHasDmg").checked=false;
  document.getElementById("ppkrDmgInput").style.display="none";

// ── Force power attack/damage rolls ──────────────────────────────────────
function rollPowerAtk(id,idx){
  const c=gc(id);const p=c.powers[idx];
  const wisMod=mod(c.abs.WIS[0]);
  const atkMod=wisMod+PROF;
  const modStr=atkMod>=0?"+"+atkMod:String(atkMod);
  const adv=diceState.adv;
  let r1=Math.ceil(Math.random()*20);
  let r2=Math.ceil(Math.random()*20);
  let chosen,breakdown;
  if(adv==="adv"){chosen=Math.max(r1,r2);breakdown="Adv: ["+r1+", "+r2+"] → "+chosen;}
  else if(adv==="dis"){chosen=Math.min(r1,r2);breakdown="Dis: ["+r1+", "+r2+"] → "+chosen;}
  else{chosen=r1;breakdown="d20: "+r1;}
  const total=chosen+atkMod;
  const isCrit=chosen===20;const isFail=chosen===1;
  const panel=document.getElementById("dice-panel");if(panel)panel.classList.add("open");
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const d20el=document.getElementById("die20");if(d20el)d20el.classList.add("active");
  diceState.die=20;diceState.count=1;
  document.getElementById("dicecount").textContent=1;
  document.getElementById("advrow").style.display="flex";
  const res=document.getElementById("dpresult");const tot=document.getElementById("dptotal");const brk=document.getElementById("dpbreak");const lbl=document.getElementById("dplabel");
  if(res&&tot&&brk&&lbl){
    res.classList.add("show");tot.textContent=total;
    tot.className="dp-total"+(isCrit?" crit":isFail?" fail":"");
    brk.textContent=breakdown+" "+modStr+" = "+total;
    lbl.textContent=p.n+" attack"+(isCrit?" — CRITICAL HIT!":isFail?" — CRITICAL FAIL":"");
    rollHistory.unshift({label:p.n+" atk",total,isCrit,isFail,breakdown:breakdown+modStr});
    if(rollHistory.length>10)rollHistory.pop();renderHistory();
  }
}

function rollPowerDmg(id,idx){
  const c=gc(id);const p=c.powers[idx];
  const wisMod=mod(c.abs.WIS[0]);
  const [num,die]=p.dmg.split("d").map(Number);
  let total=0;const rolls=[];
  for(let i=0;i<num;i++){const r=Math.ceil(Math.random()*die);rolls.push(r);total+=r;}
  const dmgTotal=total+wisMod;
  const modStr=wisMod>=0?"+"+wisMod:String(wisMod);
  const panel=document.getElementById("dice-panel");if(panel)panel.classList.add("open");
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const dieEl=document.getElementById("die"+die);if(dieEl)dieEl.classList.add("active");
  diceState.die=die;diceState.count=num;
  document.getElementById("dicecount").textContent=num;
  const res=document.getElementById("dpresult");const tot=document.getElementById("dptotal");const brk=document.getElementById("dpbreak");const lbl=document.getElementById("dplabel");
  if(res&&tot&&brk&&lbl){
    res.classList.add("show");tot.textContent=dmgTotal;tot.className="dp-total";
    brk.textContent=rolls.join(" + ")+modStr+" = "+dmgTotal;
    lbl.textContent=p.n+" · "+p.dmg+modStr+" "+p.dtype;
    rollHistory.unshift({label:p.n+" dmg",total:dmgTotal,isCrit:false,isFail:false,breakdown:rolls.join("+")+modStr});
    if(rollHistory.length>10)rollHistory.pop();renderHistory();
  }
}

window.rollPowerAtk=rollPowerAtk;
window.rollPowerDmg=rollPowerDmg;

}
