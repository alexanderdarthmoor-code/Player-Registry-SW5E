<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Registry — SW5e</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const DM_EMAIL = "alexander.darthmoor@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyB7N0A8eBdQVRhnD57GFOhdSNSR75yZLZg",
  authDomain: "sw-homebrew.firebaseapp.com",
  projectId: "sw-homebrew",
  storageBucket: "sw-homebrew.firebasestorage.app",
  messagingSenderId: "426994499491",
  appId: "1:426994499491:web:997aad0b1954fd1293a416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.isDM = () => currentUser && currentUser.email === DM_EMAIL;
window.isAuthed = () => !!currentUser;

window.handleAuth = () => {
  if (currentUser) {
    signOut(auth);
    return;
  }
  signInWithPopup(auth, provider)
    .then(result => updateAuthUI(result.user))
    .catch(e => {
      if (e.code === 'auth/popup-blocked') {
        signInWithRedirect(auth, provider);
      } else {
        console.warn("Sign in error:", e.code, e.message);
      }
    });
};

window.requireAuth = function() {
  if (currentUser) return true;
  if (confirm("Sign in with Google to make changes?")) {
    signInWithPopup(auth, provider)
      .then(result => updateAuthUI(result.user))
      .catch(e => console.warn("Sign in error:", e.code));
  }
  return false;
};

window.requireDM = function() {
  if (window.isDM()) return true;
  alert("Only the DM can edit this.");
  return false;
};

function updateAuthUI(user) {
  currentUser = user;
  const btn = document.getElementById("authbtn");
  const label = document.getElementById("authlabel");
  const badge = document.getElementById("dmbadge");
  if (!btn) return;
  if (user) {
    if (label) label.textContent = user.displayName || user.email;
    btn.textContent = "Sign out";
    if (badge) badge.style.display = window.isDM() ? "inline" : "none";
  } else {
    if (label) label.textContent = "";
    btn.textContent = "Sign in";
    if (badge) badge.style.display = "none";
  }
  if (window.render) window.render();
}

onAuthStateChanged(auth, user => {
  console.log("onAuthStateChanged fired:", user ? user.email : "null");
  updateAuthUI(user);
});

getRedirectResult(auth)
  .then(result => {
    console.log("getRedirectResult:", result ? result.user?.email : "null");
    if (result?.user) updateAuthUI(result.user);
  })
  .catch(e => console.warn("Redirect result error:", e.code, e.message));

const LIVE_CHAR_FIELDS = ["hp","hpTemp","fp","credits","inv","wpns","dt","rels","notes"];

async function pushChar(c) {
  if (!currentUser) return;
  const payload = {};
  LIVE_CHAR_FIELDS.forEach(f => { if (c[f] !== undefined) payload[f] = c[f]; });
  await setDoc(doc(db, "campaign", "chars_" + c.id), payload, { merge: true });
}

async function pushFaction() {
  if (!currentUser) return;
  await setDoc(doc(db, "campaign", "faction"), window.FACTION, { merge: true });
}

window.fbPushChar = pushChar;
window.fbPushFaction = pushFaction;

// Codex Firestore sync
window.fbGetCodex = async function() {
  try {
    const snap = await getDoc(doc(db, "campaign", "codex"));
    if (snap.exists()) return snap.data();
  } catch(e) { console.warn("Codex load error", e); }
  return null;
};
window.fbSaveCodex = async function(data) {
  if (!currentUser) return;
  try { await setDoc(doc(db, "campaign", "codex"), data, { merge: false }); }
  catch(e) { console.warn("Codex save error", e); }
};

async function loadFromFirestore() {
  for (const c of window.chars) {
    try {
      const snap = await getDoc(doc(db, "campaign", "chars_" + c.id));
      if (snap.exists()) {
        const d = snap.data();
        LIVE_CHAR_FIELDS.forEach(f => { if (d[f] !== undefined) c[f] = d[f]; });
      }
    } catch(e) { console.warn("Could not load char", c.id, e); }
  }
  try {
    const snap = await getDoc(doc(db, "campaign", "faction"));
    if (snap.exists()) {
      const d = snap.data();
      Object.keys(window.FACTION).forEach(k => {
        if (d[k] !== undefined) window.FACTION[k] = d[k];
      });
    }
  } catch(e) { console.warn("Could not load faction", e); }

  window.render();
  const ss = document.getElementById("syncstatus");
  if (ss) ss.textContent = "LIVE — REBEL ALLIANCE ENCRYPTED";

  window.chars.forEach(c => {
    onSnapshot(doc(db, "campaign", "chars_" + c.id), snap => {
      if (!snap.exists()) return;
      const d = snap.data();
      LIVE_CHAR_FIELDS.forEach(f => { if (d[f] !== undefined) c[f] = d[f]; });
      window.render();
    });
  });

  onSnapshot(doc(db, "campaign", "faction"), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    Object.keys(window.FACTION).forEach(k => {
      if (d[k] !== undefined) window.FACTION[k] = d[k];
    });
    window.render();
  });
}

function waitForApp() {
  if (window.chars && window.render && window.FACTION) loadFromFirestore();
  else setTimeout(waitForApp, 50);
}
waitForApp();
</script>

.cdx-badge{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px;white-space:nowrap}

// ── Dice Roller ───────────────────────────────────────────────────────────
let diceState={die:20,count:1,adv:"nor"};
let rollHistory=[];

function toggleDice(){
  const p=document.getElementById("dice-panel");
  p.classList.toggle("open");
}

function selDie(n){
  diceState.die=n;
  diceState.count=1;
  document.getElementById("dicecount").textContent=1;
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  const el=document.getElementById("die"+n);
  if(el)el.classList.add("active");
  // Only show adv/dis row for d20
  document.getElementById("advrow").style.display=n===20?"flex":"none";
}

function adjCount(d){
  diceState.count=Math.max(1,Math.min(20,diceState.count+d));
  document.getElementById("dicecount").textContent=diceState.count;
}

function setAdv(mode){
  diceState.adv=mode;
  document.getElementById("advbtn").className="dp-advbtn"+(mode==="adv"?" adv-on":"");
  document.getElementById("disbtn").className="dp-advbtn"+(mode==="dis"?" dis-on":"");
  document.getElementById("norbtn").className="dp-advbtn";
}

function rollOne(sides){return Math.floor(Math.random()*sides)+1;}

function doRoll(overrideDie,overrideCount,label){
  const die=overrideDie||diceState.die;
  const count=overrideCount||diceState.count;
  const adv=diceState.adv;
  let rolls=[];
  let total=0;
  let breakdown="";
  let resultLabel=label||(count+"d"+die);
  let isCrit=false;
  let isFail=false;

  if(die===20&&count===1&&adv!=="nor"){
    const r1=rollOne(20);const r2=rollOne(20);
    const chosen=adv==="adv"?Math.max(r1,r2):Math.min(r1,r2);
    total=chosen;
    breakdown=(adv==="adv"?"Adv":"Dis")+": ["+r1+", "+r2+"] → "+chosen;
    isCrit=chosen===20;
    isFail=chosen===1;
    resultLabel+=(adv==="adv"?" (Advantage)":" (Disadvantage)");
  } else {
    for(let i=0;i<count;i++){const r=rollOne(die);rolls.push(r);total+=r;}
    breakdown=rolls.join(" + ")+(count>1?" = "+total:"");
    if(die===20&&count===1){isCrit=total===20;isFail=total===1;}
  }

  // Update result display
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  res.classList.add("show");
  tot.textContent=total;
  tot.className="dp-total"+(isCrit?" crit":isFail?" fail":"");
  brk.textContent=breakdown;
  lbl.textContent=resultLabel+(isCrit?" — CRITICAL HIT!":isFail?" — CRITICAL FAIL":"");

  // Add to history
  rollHistory.unshift({label:resultLabel,total,isCrit,isFail,breakdown});
  if(rollHistory.length>10)rollHistory.pop();
  renderHistory();
}

function renderHistory(){
  const h=document.getElementById("dphist");
  if(!rollHistory.length){h.innerHTML="";return;}
  h.innerHTML=rollHistory.map(r=>`<div class="dp-hrow"><span class="dp-hlbl">${r.label}</span><span class="dp-hval${r.isCrit?" hcrit":r.isFail?" hfail":""}">${r.total}${r.isCrit?" ★":r.isFail?" ✕":""}</span></div>`).join("");
}

function rollCustom(){
  const input=prompt("Enter dice notation (e.g. 2d6, 1d8+3, 3d4):");
  if(!input)return;
  const match=input.trim().match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if(!match){alert("Format: NdN or NdN+bonus (e.g. 2d6 or 1d8+3)");return;}
  const count=parseInt(match[1]);
  const die=parseInt(match[2]);
  const bonus=parseInt(match[3]||0);
  if(count<1||count>20||die<2){alert("Keep it between 1-20 dice and d2 minimum.");return;}
  let rolls=[];let total=0;
  for(let i=0;i<count;i++){const r=rollOne(die);rolls.push(r);total+=r;}
  total+=bonus;
  const breakdown=rolls.join(" + ")+(bonus!==0?(bonus>0?"+":"")+bonus:"")+(count>1||bonus!==0?" = "+total:"");
  // Show result
  const res=document.getElementById("dpresult");
  const tot=document.getElementById("dptotal");
  const brk=document.getElementById("dpbreak");
  const lbl=document.getElementById("dplabel");
  res.classList.add("show");
  tot.textContent=total;
  tot.className="dp-total";
  brk.textContent=breakdown;
  lbl.textContent=input.trim();
  rollHistory.unshift({label:input.trim(),total,isCrit:false,isFail:false,breakdown});
  if(rollHistory.length>10)rollHistory.pop();
  renderHistory();
  document.querySelectorAll(".dp-die").forEach(d=>d.classList.remove("active"));
  document.getElementById("diecustom").classList.add("active");
}

    {id:"pl5",name:"Ryndal IV",region:"Outer Rim",control:"partial",description:"A jungle world that served as a Crymorah Syndicate slaving depot. Imperial contracts funded the operation. The cell destroyed the depot and freed the captives.",locations:"Destroyed Depot — the cleared Crymorah facility. Jungle Clearing — site of the battle, now abandoned.",hidden:false},

    {id:"pl7",name:"Pelion",region:"Outer Rim — Kathari Expanse",control:"occupied",description:"A world under Imperial blockade — officially for security enforcement, in reality retribution for local resistance. The cell ran aid shipments through the blockade under Virellian political cover.",locations:"Blockade Zone — the orbital cordon that the cell breached. Relief Settlements — civilian communities that received the aid.",hidden:false}

function openCodexModal(type,id){
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  const isDM=window.isDM&&window.isDM();
  document.getElementById("cdxModalTitle").textContent=entry.name;
  let html="";
  if(entry.portrait) html+=`<img class="cdx-modal-img" src="${entry.portrait}" alt="${entry.name}">`;
  html+=`<div class="cdx-modal-body">`;
  if(type==="npcs"){
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Affiliation</div><div class="cdx-modal-val">${entry.affiliation}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Status</div><div class="cdx-modal-val">${cdxStatusBadge(entry.status)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Last Known Location</div><div class="cdx-modal-val">${entry.location}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">History</div><div class="cdx-modal-val">${entry.history}</div></div>`;
    if(entry.rels) html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Relationships</div><div class="cdx-modal-val">${entry.rels}</div></div>`;
    if(entry.portrait&&isDM) html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Portrait URL</div><div class="cdx-modal-val" style="word-break:break-all;font-size:11px">${entry.portrait}</div></div>`;
  }else if(type==="planets"){
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Region</div><div class="cdx-modal-val">${entry.region}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Imperial Presence</div><div class="cdx-modal-val">${cdxControlBadge(entry.control)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Notable Locations</div><div class="cdx-modal-val">${entry.locations}</div></div>`;
  }else{
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Type</div><div class="cdx-modal-val">${cdxTypeBadge(entry.type)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Disposition</div><div class="cdx-modal-val">${cdxDispBadge(entry.disposition)}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">Description</div><div class="cdx-modal-val">${entry.description}</div></div>`;
    html+=`<div class="cdx-modal-field"><div class="cdx-modal-lbl">History</div><div class="cdx-modal-val">${entry.history}</div></div>`;
  }
  if(isDM){
    html+=`<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr);display:flex;gap:6px">
      <button class="abtn" onclick="closeCodexModal();editCodexEntry('${type}','${id}')">Edit</button>
      <button class="abtn" onclick="closeCodexModal();toggleHidden('${type}','${id}')">${entry.hidden?"Reveal":"Hide"}</button>
      <button class="abtn" style="color:var(--red)" onclick="closeCodexModal();deleteCodexEntry('${type}','${id}')">Delete</button>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById("cdxModalContent").innerHTML=html;
  document.getElementById("cdxModal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeCodexModal(){
  document.getElementById("cdxModal").classList.remove("open");
  document.body.style.overflow="";
}
window.openCodexModal=openCodexModal;
window.closeCodexModal=closeCodexModal;

  }catch(e){}
  // Load from Firestore via window.fbGetCodex if available, else use defaults

async function saveCodex(){
  if(window.fbSaveCodex) await window.fbSaveCodex(codexData);
}

function cdxStatusBadge(s){const m={alive:"st-alive",missing:"st-missing",dead:"st-dead",unknown:"st-unknown"};return`<span class="cdx-badge ${m[s]||"st-unknown"}">${s}</span>`;}
function cdxTypeBadge(t){const m={jedi:"ot-jedi",rebel:"ot-rebel",imperial:"ot-imperial",criminal:"ot-criminal",neutral:"ot-neutral"};return`<span class="cdx-badge ${m[t]||"ot-neutral"}">${t}</span>`;}
function cdxControlBadge(c){const m={none:"ic-none",partial:"ic-partial",occupied:"ic-occupied",lockdown:"ic-lockdown"};const l={none:"No Imperial Presence",partial:"Partial Control",occupied:"Occupied",lockdown:"Lockdown"};return`<span style="font-family:var(--fm);font-size:9px;font-weight:600" class="${m[c]||"ic-partial"}">${l[c]||c}</span>`;}
function cdxDispBadge(d){const m={allied:"dp-allied",hostile:"dp-hostile",neutral:"dp-neutral",unknown:"dp-unknown"};return`<span style="font-family:var(--fm);font-size:10px;font-weight:600" class="${m[d]||"dp-neutral"}">${d}</span>`;}

function addCodexEntry(type){
  if(!window.requireDM())return;
  const name=prompt("Name:");if(!name)return;
  const entry={id:type+Date.now(),name,hidden:false};
  if(type==="npcs"){
    entry.affiliation=prompt("Affiliation:","")||"";
    entry.status=prompt("Status (alive/missing/dead/unknown):","alive")||"alive";
    entry.location=prompt("Last known location:","")||"Unknown";
    entry.portrait="";
    entry.description=prompt("Description:","")||"";
    entry.history=prompt("History:","")||"";
    entry.rels=prompt("Relationships:","")||"";
  }else if(type==="planets"){
    entry.region=prompt("Region:","")||"";
    entry.control=prompt("Imperial control (none/partial/occupied/lockdown):","none")||"none";
    entry.description=prompt("Description:","")||"";
    entry.locations=prompt("Notable locations:","")||"";
  }else{
    entry.type=prompt("Type (jedi/rebel/imperial/criminal/neutral):","neutral")||"neutral";
    entry.disposition=prompt("Disposition (allied/neutral/hostile/unknown):","neutral")||"neutral";
    entry.description=prompt("Description:","")||"";
    entry.history=prompt("History:","")||"";
  }
  codexData[type].push(entry);
  saveCodex();
  render();
}

function editCodexEntry(type,id){
  if(!window.requireDM())return;
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  const field=prompt("Edit field:\nname / affiliation / status / location / portrait / description / history / rels (NPC)\nname / region / control / description / locations (Planet)\nname / type / disposition / description / history (Org)");
  if(!field)return;
  const val=prompt("New value:",entry[field]||"");
  if(val===null)return;
  entry[field]=val;
  saveCodex();
  render();
}

function toggleHidden(type,id){
  if(!window.requireDM())return;
  const entry=codexData[type].find(e=>e.id===id);if(!entry)return;
  entry.hidden=!entry.hidden;
  saveCodex();
  render();
}

function deleteCodexEntry(type,id){
  if(!window.requireDM())return;
  if(!confirm("Delete this entry?"))return;
  codexData[type]=codexData[type].filter(e=>e.id!==id);
  saveCodex();
  render();
}

function renderCodex(){
  const isDM=window.isDM&&window.isDM();
  const q=codexSearch.toLowerCase();
  const section=codexData[codexTab]||[];
  const filtered=section.filter(e=>{
    if(!isDM&&e.hidden)return false;
    if(!q)return true;
    return JSON.stringify(e).toLowerCase().includes(q);
  });

  let cards="";
  if(codexTab==="npcs"){
    cards=filtered.map(e=>{
      const body=e.hidden&&!isDM?
        `<div class="cdx-redacted"><span class="cdx-redacted-txt">⬛ CLASSIFIED — DM EYES ONLY</span></div>`:
        `<div class="cdx-card-body">
          ${e.portrait?`<img src="${e.portrait}" style="width:100%;height:140px;object-fit:cover;object-position:top;border-radius:2px;margin-bottom:.65rem">` :""}
          <div class="cdx-field"><div class="cdx-field-lbl">Affiliation</div><div class="cdx-field-val">${e.affiliation}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Last Known Location</div><div class="cdx-field-val">${e.location}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Description</div><div class="cdx-field-val">${e.description}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">History</div><div class="cdx-field-val">${e.history}</div></div>
          ${e.rels?`<div class="cdx-field"><div class="cdx-field-lbl">Relationships</div><div class="cdx-field-val">${e.rels}</div></div>`:""}
          ${isDM?`<div class="cdx-actions">
            <button class="abtn" onclick="editCodexEntry('npcs','${e.id}')">Edit</button>
            <button class="abtn" onclick="toggleHidden('npcs','${e.id}')">${e.hidden?"Reveal":"Hide"}</button>
            <button class="abtn" style="color:var(--red)" onclick="deleteCodexEntry('npcs','${e.id}')">Delete</button>
          </div>`:""}
        </div>`;
      return `<div class="cdx-card${e.hidden?" hidden-entry":""}" style="cursor:pointer" onclick="openCodexModal('npcs','${e.id}')">
        <div class="cdx-card-hdr">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="cdx-card-title">${e.name}</span>
            ${cdxStatusBadge(e.status)}
            ${e.hidden?`<span class="cdx-badge st-unknown">Hidden</span>`:""}
          </div>
        </div>${body}</div>`;
    }).join("");
  }else if(codexTab==="planets"){
    cards=filtered.map(e=>{
      const body=e.hidden&&!isDM?
        `<div class="cdx-redacted"><span class="cdx-redacted-txt">⬛ CLASSIFIED — DM EYES ONLY</span></div>`:
        `<div class="cdx-card-body">
          <div class="cdx-field"><div class="cdx-field-lbl">Region</div><div class="cdx-field-val">${e.region}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Imperial Presence</div><div class="cdx-field-val">${cdxControlBadge(e.control)}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Description</div><div class="cdx-field-val">${e.description}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Notable Locations</div><div class="cdx-field-val">${e.locations}</div></div>
          ${isDM?`<div class="cdx-actions">
            <button class="abtn" onclick="editCodexEntry('planets','${e.id}')">Edit</button>
            <button class="abtn" onclick="toggleHidden('planets','${e.id}')">${e.hidden?"Reveal":"Hide"}</button>
            <button class="abtn" style="color:var(--red)" onclick="deleteCodexEntry('planets','${e.id}')">Delete</button>
          </div>`:""}
        </div>`;
      return `<div class="cdx-card${e.hidden?" hidden-entry":""}" style="cursor:pointer" onclick="openCodexModal('planets','${e.id}')">
        <div class="cdx-card-hdr">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="cdx-card-title">${e.name}</span>
            ${e.hidden?`<span class="cdx-badge st-unknown">Hidden</span>`:""}
          </div>
        </div>${body}</div>`;
    }).join("");
  }else{
    cards=filtered.map(e=>{
      const body=e.hidden&&!isDM?
        `<div class="cdx-redacted"><span class="cdx-redacted-txt">⬛ CLASSIFIED — DM EYES ONLY</span></div>`:
        `<div class="cdx-card-body">
          <div class="cdx-field"><div class="cdx-field-lbl">Type / Disposition</div><div class="cdx-field-val">${cdxTypeBadge(e.type)} ${cdxDispBadge(e.disposition)}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">Description</div><div class="cdx-field-val">${e.description}</div></div>
          <div class="cdx-field"><div class="cdx-field-lbl">History</div><div class="cdx-field-val">${e.history}</div></div>
          ${isDM?`<div class="cdx-actions">
            <button class="abtn" onclick="editCodexEntry('orgs','${e.id}')">Edit</button>
            <button class="abtn" onclick="toggleHidden('orgs','${e.id}')">${e.hidden?"Reveal":"Hide"}</button>
            <button class="abtn" style="color:var(--red)" onclick="deleteCodexEntry('orgs','${e.id}')">Delete</button>
          </div>`:""}
        </div>`;
      return `<div class="cdx-card${e.hidden?" hidden-entry":""}" style="cursor:pointer" onclick="openCodexModal('orgs','${e.id}')">
        <div class="cdx-card-hdr">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="cdx-card-title">${e.name}</span>
            ${e.hidden?`<span class="cdx-badge st-unknown">Hidden</span>`:""}
          </div>
        </div>${body}</div>`;
    }).join("");
  }

  const isEmpty=!filtered.length;
  return `<div class="cdx">
    <div><div class="pgt">Codex</div><div class="pgs">GALACTIC INTELLIGENCE — REBEL CELL REFERENCE</div></div>
    <div class="cdx-top">
      <input class="cdx-search" placeholder="Search codex..." value="${codexSearch}" oninput="cdxSearch=this.value;render()">
      <div class="cdx-tabs">
        <button class="cdx-tab${codexTab==="npcs"?" active":""}" onclick="codexTab='npcs';render()">NPCs</button>
        <button class="cdx-tab${codexTab==="planets"?" active":""}" onclick="codexTab='planets';render()">Planets</button>
        <button class="cdx-tab${codexTab==="orgs"?" active":""}" onclick="codexTab='orgs';render()">Organizations</button>
      </div>
      ${isDM?`<button class="abtn" onclick="addCodexEntry('${codexTab}')">+ Add entry</button>`:""}
    </div>
    <div class="cdx-grid">${isEmpty?`<div style="font-size:13px;color:var(--txt3);padding:.5rem 0">${q?"No results for that search.":"No entries yet."}</div>`:cards}</div>
  </div>`;
}
